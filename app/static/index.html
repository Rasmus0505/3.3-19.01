<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeabur3.3 Minimal ASR</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a30;
        --text: #e7ecff;
        --sub: #9ba8d7;
        --ok: #14b87a;
        --err: #ff6464;
        --line: #253056;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        background: radial-gradient(circle at 20% 10%, #1f2a53, var(--bg));
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      p {
        margin: 0 0 8px;
        color: var(--sub);
      }
      input[type="text"],
      input[type="file"],
      button,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0e1630;
        color: var(--text);
        font-size: 14px;
      }
      button {
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        opacity: 0.9;
      }
      textarea {
        min-height: 260px;
        resize: vertical;
        font-family: Consolas, "Courier New", monospace;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #0e1630;
        color: var(--text);
        font-family: Consolas, "Courier New", monospace;
      }
      .status {
        font-weight: 600;
        margin-top: 8px;
      }
      .ok {
        color: var(--ok);
      }
      .err {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Zeabur3.3 最小 ASR 跑通页</h1>
        <p>模型：qwen3-asr-flash-filetrans</p>
        <p>路径：上传文件 / B站公开视频链接</p>
      </div>

      <div class="card">
        <h2>1) 上传本地视频/音频</h2>
        <input id="fileInput" type="file" />
        <button id="fileBtn">提交 /api/transcribe/file</button>
        <div id="fileStatus" class="status"></div>
      </div>

      <div class="card">
        <h2>2) 提交 B站链接</h2>
        <input
          id="biliInput"
          type="text"
          placeholder="https://www.bilibili.com/video/..."
          value="https://www.bilibili.com/video/BV1yP4y1n7tB?vd_source=17b43bcad6b2b6b22a6274c0e52bab67"
        />
        <button id="biliBtn">提交 /api/transcribe/bilibili</button>
        <button id="guideBtn">生成下载指引 /api/bilibili/download-guide</button>
        <div id="biliStatus" class="status"></div>
      </div>

      <div class="card">
        <h2>下载指引（B站失败时使用）</h2>
        <pre id="guideBox">暂无</pre>
      </div>

      <div class="card">
        <h2>响应结果</h2>
        <textarea id="resultBox" readonly></textarea>
      </div>
    </div>

    <script>
      const fileBtn = document.getElementById("fileBtn");
      const biliBtn = document.getElementById("biliBtn");
      const guideBtn = document.getElementById("guideBtn");
      const fileInput = document.getElementById("fileInput");
      const biliInput = document.getElementById("biliInput");
      const resultBox = document.getElementById("resultBox");
      const guideBox = document.getElementById("guideBox");
      const fileStatus = document.getElementById("fileStatus");
      const biliStatus = document.getElementById("biliStatus");

      function setStatus(el, text, ok) {
        el.textContent = text;
        el.className = `status ${ok ? "ok" : "err"}`;
      }

      function renderResult(payload) {
        resultBox.value = JSON.stringify(payload, null, 2);
      }

      function renderGuide(payload) {
        if (!payload || payload.ok !== true) {
          guideBox.textContent = JSON.stringify(payload, null, 2);
          return;
        }
        const notes = Array.isArray(payload.notes) ? payload.notes.map((x, i) => `${i + 1}. ${x}`).join("\n") : "";
        guideBox.textContent =
          `URL: ${payload.url}\n\n` +
          `Windows 命令:\n${payload.download_command_windows}\n\n` +
          `macOS/Linux 命令:\n${payload.download_command_macos_linux}\n\n` +
          `说明:\n${notes}`;
      }

      async function requestJson(url, options) {
        const resp = await fetch(url, options);
        let data;
        try {
          data = await resp.json();
        } catch (_) {
          data = { ok: false, error_code: "INVALID_JSON", message: "响应不是 JSON", detail: "" };
        }
        return { ok: resp.ok, data };
      }

      fileBtn.addEventListener("click", async () => {
        const f = fileInput.files && fileInput.files[0];
        if (!f) {
          setStatus(fileStatus, "请先选择文件", false);
          return;
        }
        setStatus(fileStatus, "处理中...", true);
        const form = new FormData();
        form.append("video_file", f);
        const res = await requestJson("/api/transcribe/file", { method: "POST", body: form });
        renderResult(res.data);
        setStatus(fileStatus, res.ok ? "成功" : "失败", res.ok);
      });

      biliBtn.addEventListener("click", async () => {
        const url = (biliInput.value || "").trim();
        if (!url) {
          setStatus(biliStatus, "请填写链接", false);
          return;
        }
        setStatus(biliStatus, "处理中...", true);
        const res = await requestJson("/api/transcribe/bilibili", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        renderResult(res.data);
        setStatus(biliStatus, res.ok ? "成功" : "失败", res.ok);
        if (!res.ok && res.data && res.data.error_code === "BILIBILI_DOWNLOAD_FAILED") {
          const guide = await requestJson(`/api/bilibili/download-guide?url=${encodeURIComponent(url)}`, { method: "GET" });
          renderGuide(guide.data);
        }
      });

      guideBtn.addEventListener("click", async () => {
        const url = (biliInput.value || "").trim();
        if (!url) {
          setStatus(biliStatus, "请先填写 B站链接", false);
          return;
        }
        const guide = await requestJson(`/api/bilibili/download-guide?url=${encodeURIComponent(url)}`, { method: "GET" });
        renderGuide(guide.data);
      });
    </script>
  </body>
</html>
