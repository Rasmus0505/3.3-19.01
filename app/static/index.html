<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeabur3.3 Minimal ASR</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a30;
        --text: #e7ecff;
        --sub: #9ba8d7;
        --ok: #14b87a;
        --err: #ff6464;
        --line: #253056;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        background: radial-gradient(circle at 20% 10%, #1f2a53, var(--bg));
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      p {
        margin: 0 0 8px;
        color: var(--sub);
      }
      input[type="file"],
      button,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0e1630;
        color: var(--text);
        font-size: 14px;
      }
      button {
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        opacity: 0.9;
      }
      textarea {
        min-height: 260px;
        resize: vertical;
        font-family: Consolas, "Courier New", monospace;
      }
      .status {
        font-weight: 600;
        margin-top: 8px;
      }
      .ok {
        color: var(--ok);
      }
      .err {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Zeabur3.3 最小 ASR 跑通页</h1>
        <p>模型：qwen3-asr-flash-filetrans</p>
        <p>路径：仅上传本地视频/音频</p>
      </div>

      <div class="card">
        <h2>上传本地视频/音频</h2>
        <input id="fileInput" type="file" />
        <button id="fileBtn">提交 /api/transcribe/file</button>
        <div id="fileStatus" class="status"></div>
      </div>

      <div class="card">
        <h2>响应结果</h2>
        <textarea id="resultBox" readonly></textarea>
      </div>
    </div>

    <script>
      const fileBtn = document.getElementById("fileBtn");
      const fileInput = document.getElementById("fileInput");
      const resultBox = document.getElementById("resultBox");
      const fileStatus = document.getElementById("fileStatus");

      function setStatus(el, text, ok) {
        el.textContent = text;
        el.className = `status ${ok ? "ok" : "err"}`;
      }

      function renderResult(payload) {
        resultBox.value = JSON.stringify(payload, null, 2);
      }

      async function requestJson(url, options) {
        const resp = await fetch(url, options);
        let data;
        try {
          data = await resp.json();
        } catch (_) {
          data = { ok: false, error_code: "INVALID_JSON", message: "响应不是 JSON", detail: "" };
        }
        return { ok: resp.ok, data };
      }

      fileBtn.addEventListener("click", async () => {
        const f = fileInput.files && fileInput.files[0];
        if (!f) {
          setStatus(fileStatus, "请先选择文件", false);
          return;
        }
        setStatus(fileStatus, "处理中...", true);
        const form = new FormData();
        form.append("video_file", f);
        const res = await requestJson("/api/transcribe/file", { method: "POST", body: form });
        renderResult(res.data);
        setStatus(fileStatus, res.ok ? "成功" : "失败", res.ok);
      });
    </script>
  </body>
</html>
