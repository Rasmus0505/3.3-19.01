# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: English Trainer Minimal Deploy
spec:
  description: Deploy FastAPI web, PostgreSQL, and Metabase with minimum manual setup for Zeabur.
  icon: https://cdn.zeabur.com/marketplace/python.svg
  tags:
    - Website
    - Database
    - Tool
  variables:
    - key: APP_DASHSCOPE_API_KEY
      type: PASSWORD
      name: DashScope API Key
      description: API key for ASR and translation features.
    - key: APP_JWT_SECRET
      type: PASSWORD
      name: JWT Secret
      description: Secret used to sign JWT tokens.
    - key: APP_ADMIN_EMAILS
      type: STRING
      name: Admin Emails
      description: Comma-separated admin email list.
  readme: |-
    # English Trainer Minimal Deploy

    This template creates 3 services in one project:

    1. `web`: FastAPI + static frontend from GHCR image
    2. `postgresql`: business database
    3. `metabase`: optional BI service

    ## What to fill during import

    - APP_DASHSCOPE_API_KEY
    - APP_JWT_SECRET
    - APP_ADMIN_EMAILS

    ## After deploy

    1. Check `GET /health` returns 200.
    2. Test `POST /api/transcribe/file` with an uploaded media file.
    3. In Metabase, keep business sync scope to `app` schema only.
  services:
    - name: postgresql
      icon: https://cdn.zeabur.com/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:18
          command:
            - docker-entrypoint.sh
            - -c
            - config_file=/etc/postgresql/postgresql.conf
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/18/docker
        env:
          PGDATA:
            default: /var/lib/postgresql/18/docker/pgdata
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
            expose: true
          POSTGRES_DATABASE:
            default: ${POSTGRES_DB}
            expose: true
          POSTGRES_DB:
            default: zeabur
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
          POSTGRES_URI:
            default: ${POSTGRES_CONNECTION_STRING}
            expose: true
          POSTGRES_USER:
            default: root
          POSTGRES_USERNAME:
            default: ${POSTGRES_USER}
            expose: true
        configs:
          - path: /etc/postgresql/postgresql.conf
            template: |
              listen_addresses = '*'
              max_connections = 256
              shared_buffers = 256MB
              dynamic_shared_memory_type = posix
              max_wal_size = 1GB
              min_wal_size = 80MB
              log_timezone = 'UTC'
              datestyle = 'iso, mdy'
              timezone = 'UTC'
              lc_messages = 'en_US.UTF-8'
              lc_monetary = 'en_US.UTF-8'
              lc_numeric = 'en_US.UTF-8'
              lc_time = 'en_US.UTF-8'
              default_text_search_config = 'pg_catalog.english'
            permission: null
            envsubst: null
    - name: web
      icon: https://cdn.zeabur.com/marketplace/python.svg
      template: PREBUILT
      dependencies:
        - postgresql
      spec:
        source:
          image: ghcr.io/rasmus0505/3.3-19.01:latest
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          PORT:
            default: "8080"
          PYTHONUNBUFFERED:
            default: "1"
          DB_INIT_MODE:
            default: auto
          DATABASE_URL:
            default: "${POSTGRES_CONNECTION_STRING}?options=-csearch_path%3Dapp%2Cpublic"
          DASHSCOPE_API_KEY:
            default: ${APP_DASHSCOPE_API_KEY}
          JWT_SECRET:
            default: ${APP_JWT_SECRET}
          ADMIN_EMAILS:
            default: ${APP_ADMIN_EMAILS}
          APP_TIMEZONE:
            default: Asia/Shanghai
          TMP_WORK_DIR:
            default: /tmp/zeabur3.3
          MT_BASE_URL:
            default: https://dashscope.aliyuncs.com/compatible-mode/v1
          MT_MODEL:
            default: qwen-mt-plus
          REDEEM_CODE_DEFAULT_VALID_DAYS:
            default: "30"
          REDEEM_CODE_DEFAULT_DAILY_LIMIT:
            default: "5"
          REDEEM_CODE_EXPORT_CONFIRM_TEXT:
            default: EXPORT
    - name: metabase
      icon: https://avatars.githubusercontent.com/u/10520629?s=1600&v=4
      template: PREBUILT
      dependencies:
        - postgresql
      spec:
        source:
          image: metabase/metabase:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          MB_DB_DBNAME:
            default: ${POSTGRES_DATABASE}
          MB_DB_HOST:
            default: ${POSTGRES_HOST}
          MB_DB_PASS:
            default: ${POSTGRES_PASSWORD}
          MB_DB_PORT:
            default: ${POSTGRES_PORT}
          MB_DB_TYPE:
            default: postgres
          MB_DB_USER:
            default: ${POSTGRES_USERNAME}
        instructions:
          - title: Metabase setup note
            content: Keep sync scope to app schema only after first login.
