# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: English Trainer Fallback Template
spec:
  description: Fallback template for web + postgresql. Preferred production path is GitHub direct build.
  icon: https://cdn.zeabur.com/marketplace/python.svg
  tags:
    - python
    - fastapi
    - postgres
  variables:
    - key: APP_DASHSCOPE_API_KEY
      type: STRING
      name: DashScope API Key
      description: API key used by ASR and translation.
    - key: APP_JWT_SECRET
      type: STRING
      name: JWT Secret
      description: Secret used to sign JWT tokens.
    - key: APP_ADMIN_EMAILS
      type: STRING
      name: Admin Emails
      description: Comma-separated admin email list.
  readme: |-
    Preferred deployment path:

    1. Connect this GitHub repository directly in Zeabur
    2. Build from the repository Dockerfile
    3. Deploy only `web` + `postgresql` for the first rollout
    4. Mount a persistent volume to `/data` for `web`
    5. Run `python -m alembic -c alembic.ini upgrade head` manually in `web`

    This template remains as a fallback import option.
  services:
    - name: postgresql
      icon: https://cdn.zeabur.com/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:18
          command:
            - docker-entrypoint.sh
            - -c
            - config_file=/etc/postgresql/postgresql.conf
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/18/docker
        env:
          PGDATA:
            default: /var/lib/postgresql/18/docker/pgdata
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
            expose: true
          POSTGRES_DATABASE:
            default: ${POSTGRES_DB}
            expose: true
          POSTGRES_DB:
            default: zeabur
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
          POSTGRES_URI:
            default: ${POSTGRES_CONNECTION_STRING}
            expose: true
          POSTGRES_USER:
            default: root
          POSTGRES_USERNAME:
            default: ${POSTGRES_USER}
            expose: true
        configs:
          - path: /etc/postgresql/postgresql.conf
            template: |
              listen_addresses = '*'
              max_connections = 256
              shared_buffers = 256MB
              dynamic_shared_memory_type = posix
              max_wal_size = 1GB
              min_wal_size = 80MB
              log_timezone = 'UTC'
              datestyle = 'iso, mdy'
              timezone = 'UTC'
              lc_messages = 'en_US.UTF-8'
              lc_monetary = 'en_US.UTF-8'
              lc_numeric = 'en_US.UTF-8'
              lc_time = 'en_US.UTF-8'
              default_text_search_config = 'pg_catalog.english'
            permission: null
            envsubst: null
    - name: web
      icon: https://cdn.zeabur.com/marketplace/python.svg
      template: PREBUILT
      dependencies:
        - postgresql
      spec:
        source:
          image: ghcr.io/rasmus0505/3.3-19.01:latest
        ports:
          - id: web
            port: 8080
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          PORT:
            default: "8080"
          PYTHONUNBUFFERED:
            default: "1"
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          DASHSCOPE_API_KEY:
            default: ${APP_DASHSCOPE_API_KEY}
          JWT_SECRET:
            default: ${APP_JWT_SECRET}
          ADMIN_EMAILS:
            default: ${APP_ADMIN_EMAILS}
          APP_TIMEZONE:
            default: Asia/Shanghai
          TMP_WORK_DIR:
            default: /tmp/zeabur3.3
          PERSISTENT_DATA_DIR:
            default: /data
          MT_BASE_URL:
            default: https://dashscope.aliyuncs.com/compatible-mode/v1
          MT_MODEL:
            default: qwen-mt-flash
          REDEEM_CODE_DEFAULT_VALID_DAYS:
            default: "30"
          REDEEM_CODE_DEFAULT_DAILY_LIMIT:
            default: "5"
          REDEEM_CODE_EXPORT_CONFIRM_TEXT:
            default: EXPORT

