schema_version: 1
task_id: TASK-014
title: 桌面端进程健康检查与自动恢复
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 为桌面端 Electron 主进程和本地后端 helper 增加可恢复的健康检查、崩溃重启与状态桥接机制，确保桌面端能够可靠等待 `/health/ready`、感知 helper 模型就绪状态，并在 helper 故障时给出明确日志与错误反馈。
scope:
  - Electron 主进程进程管理（启动等待、健康轮询、自动重启）
  - 本地 helper 健康端点补充模型就绪信息
  - Electron preload 暴露 helper 健康状态查询能力
  - 桌面端运行时日志与错误反馈
allowed_paths:
  - desktop-client/electron/main.mjs
  - desktop-client/electron/preload.mjs
  - scripts/run_desktop_backend.py
  - app/services/faster_whisper_asr.py
  - tests/test_desktop_runtime_contract.py
  - tests/test_start_script_smoke.py
acceptance:
  - 桌面客户端首次启动时，Electron 主进程必须等待本地后端 `/health/ready` 返回可用后再显示主窗口；若 helper 启动失败或超时，应弹出明确错误对话框并停止启动，而不是停留在黑屏。
  - 本地 helper 的 `/health` 与 `/health/ready` 响应必须同时包含 helper 运行模式、Python 版本、模型是否就绪（`model_ready` 或等价字段）以及模型未就绪原因，便于主进程与前端区分“进程活着”与“模型可识别”。
  - Electron 主进程必须每 30 秒轮询一次 helper 健康状态；若连续 3 次失败，必须触发一次带防重入保护的自动重启，并在重启成功后恢复轮询。
  - 若 helper 进程异常退出（非正常关闭），Electron 必须记录重启日志、向渲染进程发送重启通知，并在连续 3 次自动恢复失败后向用户展示错误对话框。
  - preload 暴露的桌面运行时桥接必须允许前端查询 helper 健康状态，返回值至少包含 `healthy`、`modelReady`、`modelStatus` 与最近检测时间，且桌面运行时构建与相关 Python 合同测试通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
  - npm --prefix desktop-client run build
  - pytest tests/test_desktop_runtime_contract.py tests/test_start_script_smoke.py
