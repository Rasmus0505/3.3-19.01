notes_for_after: |
  本任务只负责桌面端 helper 生命周期与状态桥接，不负责云端可达性、前端降级横幅或模型增量更新；这些内容分别留给 TASK-017 与 TASK-016。

  1. Electron 主进程进程管理增强（main.mjs）：
     - 在 `backendProcess` exit 事件处理器中，如果 exitCode 非零（不是正常 kill），自动调用一次 `stopBackend()` 再 `startBackend()`，并向用户显示通知
     - 在主进程启动后，每 30 秒轮询一次 `http://127.0.0.1:${backendPort}/health`，若连续 3 次失败，在 90 秒窗口内触发自动重启
     - 重启计数应写入桌面日志，超过 3 次连续重启后停止自动恢复并显示错误对话框，提示用户手动重启或查看日志
     - 注意不要在 `backendProcess` 已经是 in_flight exit 事件处理中重复触发重启（需要防重入标志）

  2. 本地 helper 健康端点增强（run_desktop_backend.py + faster_whisper_asr.py）：
     - `/health` 端点增加 `helper_mode`、`python_version`、`asr_model_ready` 字段
     - `/health/ready` 端点增加 `model_ready: bool` 字段，直接反映当前 faster-whisper 模型缓存是否就绪
     - 若模型正在下载或准备中，`model_ready` 为 false，并附带 `model_status` 说明原因

  3. preload.mjs 暴露状态查询（preload.mjs）：
     - 保持现有桥接接口兼容，并补齐 `desktop:get-helper-status`
     - 如已有同名 IPC，则改为补全返回结构与错误分支，不要重复造接口

  4. 回归保护：
     - 不要更改云端 API 路由或上传页降级策略
     - 不要破坏现有桌面构建、现有 `desktop:get-runtime-info` 返回结构与现有 smoke tests
result_summary: 完成桌面端 helper 就绪等待、健康轮询与异常重启闭环，并补齐 helper 健康状态桥接与合同测试。
