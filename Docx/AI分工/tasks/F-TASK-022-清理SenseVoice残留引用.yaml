acceptance:
  - app/services/sensevoice.py 文件已删除，且 app/services、app/models、app/api、app/schemas、app/db、app/main.py 中不再保留 SenseVoice 专用服务、模型、Schema、业务表声明或启动引用。
  - app/services/asr_model_registry.py 中 LOCAL_SENSEVOICE_ASR_MODEL 常量已删除，浏览器端默认本地模型仅保留现有有效模型。
  - frontend/src/shared/lib/asrModels.js、frontend/src/shared/media/localAsrAssetManager.js、frontend/src/features/upload/*、frontend/src/features/admin-sensevoice-settings/AdminSenseVoiceSettingsTab.jsx 不再暴露 SenseVoice model key、入口或文案，浏览器端默认模型统一为 faster-whisper-medium。
  - tests/test_regression_api.py 中直接依赖 SenseVoice 实现细节或旧 model key 的测试已改为验证“已移除”后的正确行为。
  - tests/test_faster_whisper_asr.py 中对 /api/asr-models/sensevoice-small/status 的旧断言已移除或替换。
  - npm --prefix frontend run build:app-static 与 npm --prefix frontend run build:admin 生成的新产物不再保留 SenseVoice 相关 bundle 内容。
  - pytest tests/test_regression_api.py 与 pytest tests/test_faster_whisper_asr.py 均通过。
