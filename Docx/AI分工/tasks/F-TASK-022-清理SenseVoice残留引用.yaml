notes_for_after: |
  本任务核心是"清干净"，不要在这里新增任何 ASR 能力，也不要改变 faster-whisper-medium 和 qwen3-asr-flash-filetrans 的现有配置。

  1. app/services/sensevoice.py：
     - 整文件删除即可。
     - 删除后检查所有 import sensevoice 的地方并一并清理。

  2. app/models/billing.py：
     - SenseVoiceSetting 模型类整块删除。
     - 检查是否在 Base.metadata 里仍有引用，若有则清理。

  3. app/api/routers/admin.py：
     - 删除 sensevoice-settings 相关端点函数，以及仅为这些端点服务的内部函数与 import。
     - 不要误删与 faster-whisper、subtitle settings、兑换码、钱包等无关路由。

  4. app/api/serializers.py：
     - 删除 to_sensevoice_settings_item 及所有 SenseVoiceSetting 相关的序列化器。

  5. app/core/config.py：
     - 删除 SENSEVOICE_MODEL_DIR 环境变量解析和 _default_sensevoice_model_dir 函数。

  6. app/services/billing.py：
     - 清理 sensevoice-small 相关逻辑，保持其他计费逻辑不变。

  7. app/services/asr_model_registry.py：
     - 删除 LOCAL_SENSEVOICE_ASR_MODEL 常量。

  8. app/main.py：
     - 删除 sensevoice_settings startup 注册行。

  9. 前端文件：
     - asrModels.js：删除 sensevoiceServer 和 sensevoiceBrowser，保留 fasterWhisper。
     - localAsrPreviewWorker.js 和 localAsrParallelRuntime.js：将 DEFAULT_MODEL_ID 从 "local-sensevoice-small" 改为 "faster-whisper-medium"。
     - localAsrAssetManager.js：将 FALLBACK_STATUS.model_key 改为 "faster-whisper-medium"，cache_version 改为对应版本。

  10. tests/test_regression_api.py：
      - 保留或改写为验证 SenseVoice“已移除”状态的测试，不再直接 import 或 mock 已删除的 sensevoice 模块。
      - 清理所有 "local-sensevoice-small" 在测试数据 fixture 中作为正常模型名称出现的位置，改为 faster-whisper-medium。

  11. tests/test_faster_whisper_asr.py：
      - 删除对 /api/asr-models/sensevoice-small/status 的无效请求测试行。

  12. 前端构建产物：
      - 不要手改 app/static、frontend/dist、frontend/dist-admin 中的 bundle 内容；只通过 build 命令刷新这些产物。

  13. migrations/versions/20260318_0022_sensevoice_settings.py：
      - 本任务不触碰迁移文件；sensevoice_settings 表的数据库处理由数据库迁移技能单独处理。
