conflicts_with: []
notes_for_after: |
  已检查仓库上下文：
  - `desktop/electron/preload.mjs` 当前直接 `contextBridge.exposeInMainWorld("desktopRuntime", ...)`，没有任何错误暴露。
  - `desktop/electron/main.mjs` 当前创建窗口时只设置了 `preload` 路径，没有监听 preload 失败或渲染进程控制台错误。
  - `desktop/package.json` 已把 `electron/**/*` 和 `scripts/**/*` 纳入打包，`desktop/dist/win-unpacked/resources/app/electron/preload.mjs` 当前产物也存在，因此问题更像安装包运行时的注入失败，而不是单纯漏打包。
  
  执行要求：
  1. 先在预加载脚本和主进程里补足可观测性，优先暴露静默失败原因，而不是盲改前端兜底逻辑。
  2. 如果需要修复路径、窗口选项或打包链路，保持范围在当前任务边界内，不要扩到无关桌面功能。
  3. 完成后重新打包，并基于 `win-unpacked` 或安装包实际启动结果验证 `window.desktopRuntime` 恢复。
  4. 若只能在本机环境中部分验证，请至少确保日志、产物和启动路径证据能够说明问题已经闭环，而不是只做代码猜测。
result_summary: 将 Electron 预加载脚本改为沙盒兼容写法，并在主进程补充 preload 诊断、桥接探针和日志；重新打包后验证安装包运行时 `window.desktopRuntime`、`requestLocalHelper` 与上传页“本地电脑跑”按钮均恢复可用。
