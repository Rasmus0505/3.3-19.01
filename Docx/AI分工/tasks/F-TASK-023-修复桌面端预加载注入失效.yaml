title: 修复桌面端预加载注入失效
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 修复桌面端 Electron 安装包中 window.desktopRuntime 为 undefined 的问题，使 Bottle 1.0 的“本地电脑跑”入口在正式客户端可用。
scope:
  - Electron 预加载脚本注入与主进程窗口创建
  - 安装包模式下的桌面端调试日志与错误暴露
  - Windows 打包产物中的预加载脚本随包校验
allowed_paths:
  - desktop/electron
  - desktop/package.json
  - desktop/scripts/package-win.mjs
  - desktop/dist
  - desktop/.cache
  - frontend/src/features/upload/UploadPanel.jsx
  - frontend/src/shared/media/localAsrAssetManager.js
acceptance:
  - 在安装包模式或 `desktop/dist/win-unpacked/Bottle.exe` 运行的桌面应用中，DevTools Console 执行 `window.desktopRuntime` 返回有效对象，且包含 `requestLocalHelper` 方法。
  - 选择 faster-whisper 模型后，“本地电脑跑”按钮可点击，不再因为缺少 `desktopRuntime` 而保持禁用。
  - 本地 helper 仍可健康响应（`GET /health` 返回 200），同时主进程日志或调试输出中没有新的预加载加载失败信息。
  - 打包后的 `desktop/dist/win-unpacked/resources/app/electron/preload.mjs` 存在，且调试信息足以定位安装包模式的注入路径是否正确。
check_commands:
  - npm --prefix desktop run package:win
  - if (!(Test-Path 'desktop/dist/win-unpacked/resources/app/electron/preload.mjs')) { throw 'missing packaged preload.mjs' }
