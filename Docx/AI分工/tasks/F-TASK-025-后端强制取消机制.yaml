schema_version: 1
task_id: TASK-025
title: 后端强制取消机制
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  当前 /api/lessons/tasks/{task_id}/terminate 接口收到请求后，只把任务状态标记为 terminating，生成线程是在轮询检测到 control_action="terminate" 后才抛出 LessonTaskTerminateRequested 异常，但这个检测点只在进度回调和阶段切换处稀疏调用。对于已经卡在 DashScope ASR API 调用、快速 Whisper 推理或 MT 翻译 HTTP 请求中的线程，实际上会等这些操作完成才退出。用户希望 terminate 接口能真正立即中断任务，不再让请求"假终止"。
goal: |
  让 terminate 请求真正立即中断运行中的任务：
  1. 在 DashScope ASR 调用（app/infra/asr_dashscope.py）中引入取消令牌，检测到取消时立即 abort 请求或触发超时提前退出
  2. 在快速 Whisper 推理（app/services/faster_whisper_asr.py）中的 _consume_segments 循环内定期检查取消令牌，提前终止推理
  3. 在 MT 翻译 HTTP 请求（app/services/translation_qwen_mt.py）中支持超时和取消
  4. 在生成主循环（app/services/lesson_command_service.py 的 run_lesson_generation_task）中的 ASR/翻译调用前后都检查取消令牌
  5. terminate 接口收到请求后，任务能在当前 ASR 调用或翻译 API 请求完成后立即退出，素材保留
scope:
  - ASR 调用取消机制
  - 快速 Whisper 推理取消机制
  - 翻译 API 调用取消机制
  - 生成任务主循环取消检查点
  - 任务管理器终止状态标记
allowed_paths:
  - app/infra/asr_dashscope.py
  - app/services/faster_whisper_asr.py
  - app/services/translation_qwen_mt.py
  - app/services/lesson_command_service.py
  - app/services/lesson_task_manager.py
acceptance:
  - terminate 接口收到请求后，正在运行的任务能在当前 ASR 调用或翻译 API 请求完成后立即退出，而不是继续跑完所有步骤
  - 快速 Whisper 推理能在段间循环中检测到取消并提前退出
  - DashScope ASR HTTP 请求支持超时/取消检测
  - 任务在 terminate 后被正确标记为 terminated 状态，素材保留
  - pytest tests/test_regression_api.py -q 通过
  - 不引入新的非 daemon 线程，不改变现有任务的资源管理策略
check_commands:
  - pytest tests/test_regression_api.py -q
depends_on: []
dependency_reason: ""
blocked_by: []
conflicts_with: []
notes_for_after: |
  当前终止机制核心文件分析（请在修改前先读这些文件的完整代码）：
  1. app/services/lesson_command_service.py：
     - run_lesson_generation_task 是主循环（lines ~470-522），其中 _raise_if_task_control_requested 在 lines 470, 499 等处调用
     - _raise_if_task_control_requested 在 lines 386-391 中定义，抛出 LessonTaskTerminateRequested 异常
     - LessonTaskTerminateRequested 在 lines 519-522 被捕获，调用 mark_task_terminated
     - 核心问题：ASR/翻译 API 调用中间没有取消检查点
  2. app/services/lesson_task_manager.py：
     - request_task_control（lines ~943-985）设置 task.status = TASK_STATUS_TERMINATING
     - mark_task_terminated（lines ~1095-1124）设置终止状态和素材保留
  3. app/services/faster_whisper_asr.py：
     - _consume_segments 函数（lines ~829-875）循环消费分段，目前只在进度回调中检测取消
     - waiting_stop threading.Event（lines ~967-1023）只停止进度报告线程，不停止推理本身
     - 关键：需要在 _consume_segments 的循环内检查取消状态
  4. app/infra/asr_dashscope.py：
     - transcribe_audio_file 函数中的 HTTP 请求需要支持超时和取消
  5. app/services/translation_qwen_mt.py：
     - translate_sentences_to_zh 中的 HTTP 请求需要支持超时和取消
  实现思路：在 lesson_command_service.py 的 run_lesson_generation_task 中，将 cancel_token（一个 threading.Event）传递给 ASR 和翻译调用方，ASR/翻译内部在合适的检查点（如段间循环、HTTPS 调用的超时处理）检查该 token。
  注意事项：
  - 线程是 daemon 的，不能用 Thread.join() 强制中断
  - 只能通过 cooperative cancellation 提前让 ASR/翻译退出
  - 不改变现有任务的资源管理策略，不引入新的非 daemon 线程
  - 回归测试必须通过，不能破坏现有的正常生成流程
result_summary: "补齐任务级 terminate 运行时信号，并让 DashScope ASR、faster-whisper、翻译批处理和主循环在当前请求完成后立即退出并落到 terminated。"
