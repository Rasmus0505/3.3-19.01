notes_for_after: Keep this as one closed-loop task. Do not split frontend, backend, migration, and verification across multiple agents. Reuse the existing shell and immersive-learning patterns where possible, but add new files under frontend/src/features/wordbook and backend wordbook modules if that keeps the implementation cleaner than overloading unrelated modules. The backend should introduce structured wordbook entry storage plus source-link rows, default to active-only listing, and leave full SRS scheduling out of scope while keeping field design extensible for later review features. Because this task adds database tables, you must use `$postgresql-update` after implementation and test verification so the live PostgreSQL schema is updated and directly verified instead of being left as a local-only migration.
result_summary: Added the logged-in sidebar wordbook panel and immersive single-word or phrase collection flow, introduced structured wordbook storage with deduped context-link tables plus APIs and regression coverage, synced checked-in static assets, and verified the live PostgreSQL schema reached revision 20260322_0027 with the new wordbook tables present.
