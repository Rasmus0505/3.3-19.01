acceptance:
  - The learning sidebar shows a logged-in "生词本" entry directly below "历史记录", and the app can open the new panel from its own route without breaking existing history, upload, redeem, or immersive flows.
  - The immersive learning page lets the user collect a single word by direct interaction and collect a phrase by selecting a continuous span from the current English sentence, with clear success feedback for both create and duplicate-update cases.
  - The wordbook panel lists structured entries with entry text, entry type, latest English sentence, latest Chinese sentence, source lesson, latest collected time, and actions for mark mastered, restore active, and delete.
  - Active entries are the default list, mastered entries are hidden by default but available through an explicit filter, and source-course filtering plus recent-first sorting work in the same panel.
  - Backend storage deduplicates by the same user plus normalized text plus entry type, updates the latest context when a duplicate is collected again, and retains source linkage data instead of creating duplicate primary entries.
  - The backend rejects collection attempts for lessons the user does not own, missing sentence indexes, and invalid selected text that is not a valid continuous fragment of the sentence.
  - The task includes the required Alembic migration and keeps local and live PostgreSQL schema in sync by running and verifying `$postgresql-update` when the new tables are introduced.
  - The tests and builds touched by this task pass within the same task, without depending on another task to add API coverage, migration verification, or frontend route/build verification.
check_commands:
  - 'pytest tests/test_regression_api.py -k "wordbook or spa or route"'
  - 'pytest tests/test_e2e_key_flows.py -k "wordbook or immersive or history"'
  - pytest tests/test_spa_route_fallback.py
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
