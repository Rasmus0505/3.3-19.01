schema_version: 1
task_id: TASK-004
title: 修正沉浸式生词选择入口与交互方式
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 在不改变现有答题区尺寸的前提下，修正沉浸式学习里的生词选择入口，把选词能力并入“上一句”现有展示区域，移除答题区上方额外收藏区和短语模式开关，并让单击选词、长按拖选连续词配合右侧常驻按钮完成加入生词本。
scope:
  - 沉浸式学习页“上一句”区域的选词与短语选择交互
  - 沉浸式学习页“加入生词本”按钮布局与首句隐藏逻辑
  - 与新交互一致的前端回归与端到端验证
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - tests/test_e2e_key_flows.py
  - tests/test_regression_api.py
acceptance:
  - 沉浸式学习页不再在答题区上方新增任何“生词本收藏”区域，也不再出现“选择短语/退出短语模式/清除选择”等额外控制，答题区高度与现有效果保持一致。
  - 选词入口只出现在现有“上一句”展示区域内；第 1 句因为没有上一句时，整个选词入口与右侧“加入生词本”按钮都不显示。
  - 用户在“上一句”英文句子中单击单个单词时，只选中该词；右侧常驻“加入生词本”按钮可将当前选中的单词加入生词本，并给出成功或重复更新反馈。
  - 用户在“上一句”英文句子中长按后拖过连续单词时，可形成连续短语选择；右侧常驻“加入生词本”按钮可将当前连续选区加入生词本，不需要任何短语模式开关。
  - 中文译文仍用于展示，不承担选词交互；上一句区域与按钮布局应尽量保持单行右侧按钮结构，不得通过新增上方块级区域挤压答题区。
  - 原有生词本后端、侧栏页、收藏去重、状态切换与删除能力保持不变；本次修复不引入新的收藏类型、数据库结构或额外后端接口变更。
  - 本任务涉及的回归测试覆盖首句隐藏入口、单击选词、长按连续选词、按钮触发收藏以及原有生词本 API 不回退。
check_commands:
  - 'pytest tests/test_regression_api.py -k "wordbook"'
  - 'pytest tests/test_e2e_key_flows.py -k "wordbook or immersive"'
  - 'npm --prefix frontend run build'
