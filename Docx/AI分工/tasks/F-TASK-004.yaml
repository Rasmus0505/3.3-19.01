fix_request: 用户反馈 004 的沉浸式收藏交互方向做错了：不要在答题区上方额外增加生词选择区域；应把选词能力并入答题区对应的“上一句”现有展示区域，在那一行里完成选择。不要再有短语模式开关，而是改成单击选择单词、长按拖选连续单词，并在右侧保留常驻“加入生词本”按钮；同时不能影响当前答题区大小。第 1 句没有上一句时隐藏整套入口。
fix_reason: 已交付版本虽然完成了生词本存储与管理能力，但沉浸式页面的交互承载位置、心智模型和空间占用都偏离真实使用目标。当前额外收藏区和短语模式增加了界面负担，也破坏了用户认可的答题区尺寸，需要按“借助上一句顺手收词”的真实使用路径返工。
fix_round: 1
fix_result_summary: Removed the immersive top collection panel, embedded selection into the previous-sentence row, added single-click and long-press range selection, and kept the persistent add button hidden on the first sentence.
