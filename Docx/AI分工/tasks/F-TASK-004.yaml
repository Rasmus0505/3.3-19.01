notes_for_after: 这是对已交付错误交互的定向返工，不要重做后端存储和侧栏生词本页面。优先复用现有 wordbook collect API 与已有上一句展示区域，只调整沉浸式页面内的交互承载位置、手势语义和按钮布局。以“解决用户在复习上一句时顺手收词”为目标，而不是保留此前那套额外收藏面板。按钮应放在上一句区域右侧，避免新增垂直高度；单击用于选择一个词，长按拖动用于形成连续短语选择；不再保留任何短语模式切换心智。首句没有上一句时直接隐藏整套入口，不做回退到当前句的兜底。
result_summary: Reworked immersive wordbook collection into the existing previous-sentence row, removed the extra collection panel and phrase-mode controls, and switched collection to button-triggered single-click or long-press range selection without changing backend wordbook APIs.
