task_id: TASK-004
title: Add sidebar wordbook with in-learning collection and structured backend storage
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: Add a logged-in sidebar "生词本" panel below history, let users collect words or phrases directly during immersive learning, store those entries with deduped structured context on the backend, and ship the required migration, API, UI state handling, and verification in one self-contained task.
scope:
  - Learning shell sidebar navigation and panel routing for the new wordbook panel
  - Wordbook panel UI with active/mastered filtering, source-course filtering, sorting, and item actions
  - Immersive learning interactions for single-word collect and phrase selection collect
  - Backend SQLAlchemy models, Alembic migration, repositories, services, schemas, and routers for wordbook storage
  - Backend and integration regression coverage for wordbook CRUD, dedupe, permissions, and route behavior
  - Frontend build output sync if this repo expects app static assets to stay checked in
