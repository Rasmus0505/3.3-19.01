schema_version: 1
task_id: TASK-012
title: 新增影院全屏中文字幕模糊遮挡卡片
status: todo
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 在沉浸学习的影院全屏模式中新增一块默认贴附中文字幕区域的低存在感模糊遮挡卡片，支持开关、拖动、缩放、按住临时透出，以及通过学习参数配置默认快捷键 Shift+B
scope:
  - 沉浸学习影院全屏里的中文字幕遮挡交互与视觉样式
  - 学习参数中的快捷键配置与本地持久化
  - 桌面优先且移动端基础可用的拖拽与按住透出体验
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - frontend/src/features/immersive/immersive.css
  - frontend/src/features/immersive/learningSettings.js
  - frontend/src/features/lessons/LessonList.jsx
acceptance:
  - 进入沉浸学习的影院全屏后，若当前显示了“上一句/本句”的中文字幕区域，则默认显示一块低存在感的半透明模糊卡片，初始位置和尺寸贴附中文翻译文本区域，且第一版只允许存在这一块卡片
  - 模糊卡片默认只在影院全屏中出现；普通沉浸页不显示该能力；用户可通过影院全屏内的显式按钮打开或关闭遮挡卡片，关闭后本次学习内不再遮挡，重新打开时恢复到最近一次保存的位置和尺寸
  - 用户可直接拖动卡片位置并调整宽高；桌面端鼠标可完成拖拽与缩放，移动端至少可完成基础拖动、基础缩放或等效尺寸调整，且卡片始终限制在中文字幕所在的学习信息层可操作范围内，不得漂移到页面不可见区域
  - 卡片视觉为低存在感玻璃片风格：遮挡效果以模糊被覆盖内容为主，不得退化成纯白板或纯色硬遮罩；常态下不明显破坏视频观感，但用户仍能识别并抓取这块卡片
  - 用户按住默认快捷键 Shift+B 时，被遮挡的中文字幕临时变清晰或显著降低模糊；松开后立即恢复遮挡；同一能力也可通过按住影院全屏按钮实现，不要求额外提供重置按钮、双击重置或自动回位
  - 学习参数配置区新增该快捷键动作，默认值为 Shift+B，允许像现有快捷键一样录入新按键、持久化到本地设置并在沉浸学习页实时生效；若用户改键，沉浸页提示文案与实际监听行为保持一致
  - 卡片的开关状态、位置与尺寸按全局单份本地设置持久化，不按课程单独保存；重新进入任意课程的影院全屏时应复用最近保存的一份状态
  - 当影院全屏中主动隐藏“上一句”或当前没有可显示的中文字幕块时，不得遗留悬空模糊卡片、错位点击区域或影响现有生词本、播放、拼写输入等交互
  - 现有揭示字母、揭示单词、上一句、下一句、重播、暂停/继续播放等学习快捷键行为保持可用，不因新增 Shift+B 或卡片指针交互而回归失效
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
