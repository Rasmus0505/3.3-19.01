notes_for_after: 基于现有实现，字幕中文位于 ImmersiveLessonPage 里的 previous/current sentence 文本块中，影院全屏态通过 cinemaFullscreenActive 控制。第一版不要把功能泛化成任意多遮罩或全页面遮挡系统，只解决“影院全屏里默认模糊住中文字幕、但可临时偷看”的训练问题。实现时优先把遮挡卡片锚定在 `.immersive-previous-sentence` 这块学习信息层上，而不是覆盖整段视频画面；若当前字幕块隐藏，则同步隐藏卡片。交互上采用单卡片模型，提供显式开关按钮，并把“按住透出”接到现有学习参数快捷键体系里，新增一个可配置动作，默认 Shift+B。持久化沿用 learningSettings 的 localStorage 结构扩展 uiPreferences 或等价字段，保存全局单份 enabled/position/size 数据即可，不要做按课程持久化，也不要额外引入后端接口。移动端只要求基础可用，不要为了第一版引入复杂多手势编辑器；若缩放实现受限，可使用角点拖拽或其他基础方案，但最终必须满足用户能改位置和尺寸。注意该任务与未完成的 TASK-004 同时修改 ImmersiveLessonPage.jsx，落地前先合并最新工作区并避免覆盖对方改动。
