notes_for_after: |
  背景：TASK-018 已经完成了三路生成链路的接口路由，transcribe_audio_file() 的模型分发逻辑本身正确（当 model=="faster-whisper-medium" 时走 _transcribe_audio_file_with_faster_whisper 分支），但 PyInstaller 打包时没有收集 ML 依赖，导致本地推理运行时直接 ModuleNotFoundError。

  本次修复只涉及打包层面，不改变接口契约和前端调用逻辑。

  修复内容：
  1. build-helper-runtime.mjs：添加 --collect-all faster_whisper/ctranslate2/modelscope/transformers/sentencepiece/tokenizers 及 --hidden-import app.services.faster_whisper_asr/app.services.asr_model_registry/app.infra.asr_dashscope
  2. write-runtime-defaults.mjs：读取 asr-test/models/faster-distil-small.en 是否存在，将路径写入 packaged runtime-defaults.json 的 local.preinstalledModelDir
  3. runtime-config.mjs：buildDefaultConfig 读取 packagedDefaults.local.preinstalledModelDir，作为 DESKTOP_MODEL_DIR 环境变量的 fallback 值
  4. main.mjs：将 resolveDesktopModelDir()（含 packaged fallback）通过 DESKTOP_MODEL_DIR 环境变量传给 helper 子进程
  5. run_desktop_backend.py：_configure_runtime_environment() 已经正确设置 FASTER_WHISPER_MODEL_DIR 环境变量，无需修改

  验证方式：
  - dist/win-unpacked/resources/desktop-helper-runtime/BottleLocalHelper/_internal/faster_whisper 包含 __init__.py 等 8 个 .py 文件
  - dist/win-unpacked/resources/desktop-helper-runtime/BottleLocalHelper/_internal/ctranslate2 包含 ctranslate2.dll (59MB)、_ext.cp311-win_amd64.pyd
  - dist/win-unpacked/resources/preinstalled-models/faster-distil-small.en 包含 5 个模型文件
  - dist/win-unpacked/resources/runtime-defaults.json 包含 local.preinstalledModelDir
result_summary: 修复桌面端本地ASR推理：PyInstaller打包脚本补充faster_whisper/ctranslate2/modelscope/transformers/sentencepiece/tokenizers收集项和ASR服务hidden-import项；runtime-defaults.mjs注入打包模型目录路径；runtime-config.mjs读取并fallback到preinstalledModelDir；验证dist产物包含完整ML模块、59MB原生二进制和5个预装模型文件；前端构建全部通过。
