schema_version: 1
task_id: TASK-027
title: 落地每课课程工作区底座
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: 当前课程生成相关状态分散在临时目录、任务轮询返回、IndexedDB 快照和零散日志里，用户下一步想要的“生成工作台”“实时字幕”“断点恢复”和后续链接导入接入都缺少统一承接面。继续维持这种分散状态，会导致中间字幕、过程日志和恢复信息无法稳定落到同一个课程上下文里，刷新页面或后续扩展时也很难判断该恢复什么。本任务要先补一个“每课一个工作区”的底座，把素材元数据、中间字幕快照和运行日志收拢成统一抽象，先服务恢复和排错，不急着做新页面。
goal: 为课程生成链路增加每课工作区抽象与持久化摘要，统一承接素材信息、中间字幕快照和过程日志。
scope:
  - 课程生成任务与课程结果的工作区元数据
  - 服务端工作区摘要的持久化位置与读写契约
  - 上传页本地任务快照与工作区恢复映射
allowed_paths:
  - app/core/config.py
  - app/api/routers/lessons.py
  - app/services/lesson_service.py
  - app/services/lesson_task_manager.py
  - frontend/src/shared/media/localTaskStore.js
  - tests/test_regression_api.py
acceptance:
  - 新建课程生成任务或本地生成完成时，系统必须在现有服务端可写持久目录体系内为该任务或课程生成可追踪的工作区摘要，至少能关联来源素材信息、运行位点、最新中间字幕快照和过程日志摘要，而不是只返回百分比与文案。
  - 当任务尚未落成正式 lesson 时，工作区也必须能以任务维度独立存在；任务成功后应能补绑到最终 lesson，且不丢失前面的中间记录。
  - 上传页刷新或重新进入时，本地任务快照只负责恢复到同一工作区上下文与最近恢复指针；前端不得再把字幕草稿和过程日志维护成脱离工作区的第二份主副本。
  - 本任务不新增用户可见工作区页面，但相关接口与本地快照结构必须足以支撑后续工作台读取工作区摘要，不得破坏现有历史列表、课程详情和本地生成入库链路。
check_commands:
  - pytest tests/test_regression_api.py -q
  - npm --prefix frontend run build
depends_on: []
dependency_reason: ""
blocked_by: []
conflicts_with: []
notes_for_after: 这项任务是后续“生成工作台”和“流式字幕”要踩的底座，不要顺手做上传页视觉改版。优先把工作区设计成统一抽象，而不是分裂成 cloud/local 两套：至少要能承接来源素材信息、运行位点、最新字幕草稿、阶段日志和最终 lesson 绑定。若任务开始时还没有 lesson_id，可先用 task 维度工作区，成功后再补 lesson 绑定。持久化主副本优先落在现有服务端可写持久目录与任务产物体系中，`localTaskStore.js` 只保留恢复指针和最小快照，不要把前端 IndexedDB 扩成第二套权威工作区存储；同时保持对未来 `TASK-026` 链接导入进入同一工作区的兼容余地。
result_summary: >-
  为课程生成链路补齐服务端 workspace summary 持久化，任务与直出课程都会生成可追踪工作区摘要，
  任务接口与本地快照同步只保留最小恢复指针，并在任务成功后把工作区绑定到最终 lesson。
