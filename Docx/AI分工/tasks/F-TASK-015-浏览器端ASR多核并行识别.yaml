title: 浏览器端 ASR 多核并行识别
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 优化本地 ASR Worker Pool 在多核机器上的并行效率：在音频分片策略、并发调度、内存管理和进度感知四个维度改进，使 8+ 核机器上识别时长显著低于串行 baseline，同时不因 Worker 数过多导致 OOM。
scope:
  - ASR Worker Pool 并行分片策略（动态并发决策）
  - Worker 生命周期管理与内存上限
  - 音频切段方案优化（overlap 策略、重叠区裁切精度）
  - 并行识别进度精细化（per-worker progress、分段完成感知）
allowed_paths:
  - frontend/src/features/upload/localAsrParallelRuntime.js
  - frontend/src/features/upload/localAsrPreviewWorker.js
  - frontend/src/shared/media/localAsrAssetManager.js
  - frontend/src/shared/media/localAsrPreviewStore.js
acceptance:
  - `runLocalAsrWithAutoParallelism()` 的自动并发决策必须基于 `navigator.hardwareConcurrency` 动态收敛到明确上限：逻辑核数 >= 8 时上限至少提升到 6，>= 12 时上限至少提升到 8；同时音频时长低于 3 分钟时不得分片并发。
  - 分片计划必须从“目标分片数/目标分片时长”推导，而不是只依赖固定时长 bucket；overlap 裁切必须结合相邻词时间戳 gap，自适应缩小无效重叠，且保持拼接结果不出现明显重复词。
  - Worker 运行时必须在单段转写完成后释放该段音频缓冲，不共享大块音频引用；当池大小大于 4 时必须采用分批启动，避免一次性拉起全部 Worker。
  - `onProgress` / worker 进度事件必须区分模型加载阶段与实际转写阶段，并能向前端汇报“第 X/Y 段已完成”的细粒度状态；任意 worker 失败时不得静默吞错。
  - 不得改变 `asr_payload` 输出 schema，且前端构建命令保持通过。
