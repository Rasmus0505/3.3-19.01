notes_for_after: |
  这次不要再把任务理解成“只把浏览器端 ASR 开关从 false 改成 true”。用户真正要的是把 Bottle 1.0 的计算压力从服务器挪到用户机器，但仓库现状并不要求把整个 lessons 目录/详情体系都迁到本地 helper。

  1. 先固定产品边界：
     - `desktop_local`、`browser_local`、`cloud` 三种运行位点都要成为真实路径。
     - “本地生成”指抽音频、ASR、课程结构/字幕变体生成发生在用户机器。
     - 现有云端 `/api/lessons` 目录/详情读取、登录态用户归属和钱包扣费语义可以继续保留，不要扩展成“helper 全量接管 lessons API”。
     - 上传页移动端展示与默认策略这次也一并收口在本任务内处理，不再和 `TASK-020` 竞争 `UploadPanel.jsx`。

  2. 翻译与降级语义：
     - 直接复用现有 `LessonService.build_subtitle_variant` / `generate_from_local_asr_payload` 的翻译与 partial success 语义，不要额外发明纯离线 MT 方案。
     - 若 `DASHSCOPE_API_KEY` 缺失或翻译部分失败，本地模式仍应生成保留英文字幕的可学习结果，并明确标记为 partial/本地结果，而不是把任务做成阻塞。

  3. 归属与持久化语义：
     - 继续沿用当前登录用户与现有钱包计费规则，不引入新的离线钱包、本地账户或双账本。
     - 如果需要新增“本地已完成课程结果”的提交接口，该接口只负责保存已生成结果到现有课程目录；不要让云端重新执行本地计算步骤。

  4. 本地入口：
     - `run_desktop_backend.py`、`desktop_asr.py`、Electron preload/helper 合同需要补齐到“本地生成”级别，而不是停留在单次转写。
     - `preview-local.bat` 必须拉起可承接本地网站运行位点的本机运行时，不能再只是裸 `vite preview`。

  5. 回归边界：
     - runtime 标记至少区分 `desktop_local`、`browser_local`、`cloud`，并贯穿前端状态、任务结果和课程结果。
     - 不要顺手扩展到无关的管理后台、Bottle 2.0 计费、安装器外观或完整离线 lessons 目录体系重构。
result_summary: 完成 Bottle 1.0 三路运行位点闭环：上传页新增本地电脑跑/本地网站跑/服务器跑三种真实轨道，本地 helper 与本地网站 runtime 会在用户机器完成抽音频、ASR 和课程结构生成，云端新增本地结果入库接口仅负责保存课程与结算；同时补齐 preview-local 入口、说明文档与回归测试。
