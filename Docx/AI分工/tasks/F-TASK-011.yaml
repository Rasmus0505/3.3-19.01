notes_for_after: 客户端首期只解决“把现有网站封装成 Windows 客户端并安全并行开发”的问题，不顺手改上传页、Bottle 1.0/2.0 业务分流或 Zeabur 生产部署逻辑。优先复用现有 FastAPI 根页面与 `/api/*` 契约，让 Electron 负责启动本地后端、等待 `/health`、打开窗口、退出清理与错误提示。为避免影响线上，桌面端相关依赖与脚本全部收敛到 `desktop-client` 和少量根级文档/忽略规则中；不要把 Electron 构建接入现有 Dockerfile，也不要让 `frontend/scripts/sync-app-static.mjs` 感知桌面端产物。README 里应写清后续人工操作：开发者如何仅在本机灰度测试客户端、如何继续正常推送网站到 Zeabur、以及什么时候才需要手动打包 Windows 客户端给小范围试用。
result_summary: 完成 Windows Electron 客户端工程，新增本地 FastAPI 启动脚本、桌面端主进程与 preload、安全的本地缓存和日志目录约定、客户端打包脚本与本地灰度文档，并通过 `.dockerignore` 与契约测试保证 Zeabur 网站部署链路不接入桌面端产物；`npm --prefix desktop-client run package:win` 现可生成同步到 `desktop-client/dist` 的 Windows portable 分发产物。
