title: 字幕遮挡板毛玻璃交互
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 将影院全屏中的字幕遮挡板改成默认命中视频底部硬字幕区域、支持四角缩放、并以毛玻璃方式模糊下方视频画面的可调遮挡板
scope:
  - 沉浸学习影院全屏中的字幕遮挡板默认落点、缩放交互与样式
  - 学习参数里的字幕遮挡板文案与位置尺寸持久化
  - 影院全屏视频层内的毛玻璃效果与回归验证
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - frontend/src/features/immersive/immersive.css
  - frontend/src/features/immersive/learningSettings.js
acceptance:
  - 进入影院全屏视频后开启遮挡板，首次默认以最小高度出现在视频底部字幕带，并始终限制在视频可视区域内，不得压到下方答题区
  - 用户拖动遮挡板本体时继续维持现有整块移动体验；遮挡板提供四个角的缩放控制点，四角均可独立调整尺寸，当前仅单一右下角缩放的交互必须被替换
  - 首次开启使用最小高度默认尺寸；用户手动调整后，后续重新进入任意课程的影院全屏时复用上次保存的位置与尺寸，而不是每次重置
  - 现有开关按钮文案改为“字幕遮挡板”；遮挡板本体内的标签文案也改为“字幕遮挡板”
  - 遮挡板视觉效果应优先实现对其下方视频画面的真实模糊或等价毛玻璃效果，避免继续呈现为一块生硬深色板；若浏览器能力限制导致无法稳定实现真模糊，需采用明确记录的降级样式，并保持视觉上明显柔化
  - 遮挡板仅在影院全屏中出现，普通沉浸学习页不复用该逻辑；现有播放、上一句、下一句、重播、暂停继续、生词本等交互不得因返工失效
  - 遮挡板的拖动、缩放、默认落点与边界计算都以当前视频可视区域为准；视频尺寸变化后，持久化的相对位置和尺寸仍能正确映射
