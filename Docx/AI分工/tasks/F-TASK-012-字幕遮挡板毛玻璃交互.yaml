notes_for_after: 当前实现已经把 translationMask 渲染到影院全屏视频层，并具备整块拖动、单一右下角缩放和位置尺寸持久化；本轮不要推翻这套状态模型，而是在此基础上收紧交付形态。需要把默认落点改成视频底部字幕带且首次高度为最小值，把缩放交互改成四个角都可操作，同时保留拖动卡片本体移动的现有体验。按钮文案与板内标签统一改成“字幕遮挡板”。视觉上优先交付能直接模糊下方视频画面的毛玻璃效果；如果目标浏览器对 video + backdrop-filter 组合存在稳定性限制，必须在同一任务内给出最强可接受降级方案，并在结果里说明取舍，而不是留成后续问题。本轮只做单块遮挡板，只影响影院全屏；不要扩展为多块系统，也不要把普通沉浸页并入同一逻辑。移动端只要求基础可用，不要求复杂多手势编辑器。
result_summary: 已将影院全屏字幕遮挡板收敛到视频可视区域，默认以最小高度落在底部字幕带，支持拖拽与四角缩放，并交付毛玻璃优先的柔化遮挡效果与显式降级。
