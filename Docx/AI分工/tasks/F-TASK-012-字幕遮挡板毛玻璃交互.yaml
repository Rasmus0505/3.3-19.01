fix_reason: 当前交付虽然已经把遮挡板放进视频层，但默认尺寸与落点、缩放交互和视觉效果仍不符合真实使用场景。用户真正要的是一块能快速命中底部硬字幕、可精细调节、视觉上不生硬的字幕遮挡板，而不是一块只有单角缩放的普通深色卡片。
fix_round: 2
fix_result_summary: 已补齐字幕遮挡板的底部默认落点、四角缩放、毛玻璃样式与文案统一，并用布局版本重置旧持久化位置以避免沿用错误几何。
