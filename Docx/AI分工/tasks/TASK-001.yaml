acceptance:
  - /api/asr-models and related backend metadata expose only faster-whisper-medium and qwen3-asr-flash-filetrans as upload ASR choices.
  - /api/transcribe no longer defaults to or accepts sensevoice-small as an active model choice.
  - No lesson creation or task-resolution path silently falls back from faster-whisper-medium to sensevoice-small.
  - Default ASR settings, seeded billing rates, and serializer display labels no longer default to or advertise bottle0.1/sensevoice-small.
  - Sensevoice admin settings endpoints and local bundle listings are removed from active backend usage or fail in a controlled unsupported/not-found way.
  - User-facing backend display metadata returns Bottle 1.0 for faster-whisper-medium and Bottle 2.0 for qwen3-asr-flash-filetrans.
  - The backend tests touched by this task pass without waiting on another task to update their expectations.
check_commands:
  - 'pytest tests/test_regression_api.py -k "asr_model or billing_rates or subtitle_settings or faster_whisper or sensevoice or transcribe"'
  - pytest tests/test_faster_whisper_asr.py
