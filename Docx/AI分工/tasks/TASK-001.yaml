task_id: TASK-001
title: Remove sensevoice upload support and backend fallbacks
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: Remove active backend support for bottle0.1/sensevoice-small across the app runtime so only faster-whisper-medium and qwen3-asr-flash-filetrans remain as upload and transcribe ASR models, update backend display metadata to Bottle 1.0 and Bottle 2.0, and bring the coupled backend tests along in the same task.
scope:
  - ASR model registry and status APIs
  - Lesson default model and fallback resolution
  - Billing/default subtitle settings for upload ASR models
  - Admin model-management APIs and downloadable model bundles
  - Direct transcribe runtime entrypoints and serializer metadata that still advertise or default to sensevoice
  - Coupled backend regression tests that currently assert sensevoice behavior
