goal: 调整上传页主流程文案和价格说明，删除当前普通服务端流程中冗余的本地模型下载区块与重复“生成方式”摘要，将模型选择区改名为“选择字幕生成方式”，并让“预估价格”同时体现 ASR 与 MT 翻译的估算口径。
scope:
  - 上传页主流程信息卡与模型选择区文案
  - 上传前价格估算展示逻辑
