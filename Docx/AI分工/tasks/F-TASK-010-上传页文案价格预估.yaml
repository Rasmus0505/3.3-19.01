acceptance:
  - 上传页顶部摘要不再单独显示“生成方式：...”这一行，避免与下方模型选择区重复表达同一信息。
  - 上传页当前面向普通服务端流程的“下载本地模型”整块被移除，不再暗示用户必须先下载站点同款模型目录才能开始上传生成。
  - 下方模型选择区标题改为“选择字幕生成方式”，并保留 Bottle 1.0 与 Bottle 2.0 的现有选择交互、状态徽标和准备状态提示。
  - “预估价格”不再只显示 ASR 分钟价，而是基于现有 `billingRates` 中的 ASR 与 `qwen-mt-flash` 费率展示总预估金额或清晰拆分的 ASR + MT 估算，并明确 MT 为估算值而非最终扣费。
  - 如果 TASK-006 后续已引入灰度本地 Bottle 1.0 入口，本任务不得误删该灰度入口；只移除当前这块面向普通服务端流程的通用下载区块。
  - 前端构建通过，且若仓库要求同步静态产物，`app/static/assets` 与源码保持一致。
