schema_version: 1
task_id: TASK-005
title: 为课程生成增加服务端准入控制与背压
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: Add hard server-side protection for the lesson-generation pipeline so concurrent uploads cannot spawn unbounded background work, and return controlled busy/queue responses before the web process is saturated.
scope:
  - Lesson task admission and active-task counting
  - Configurable concurrency and queue caps for upload and local-ASR task creation
  - Controlled API error or queue metadata when capacity is exhausted
  - Regression coverage for admission control, queue counting, and non-regression of existing task creation
allowed_paths:
  - app/core/config.py
  - app/api/routers/lessons.py
  - app/services/lesson_command_service.py
  - app/services/lesson_task_manager.py
  - tests/test_regression_api.py
acceptance:
  - Creating lesson tasks no longer starts unlimited background work; the backend enforces explicit caps before thread startup.
  - When active running work is at capacity but the waiting budget is not exhausted, new tasks are persisted in a controlled pending state instead of starting immediately.
  - When both running capacity and waiting capacity are exhausted, the API returns a controlled busy response with machine-readable detail instead of falling through to generic 500 behavior.
  - Task admission counts both upload and local-ASR generation against the same protection budget so users cannot bypass the cap by switching entrypoints.
  - Existing pause, terminate, resume, and success flows still work for admitted tasks.
  - Regression tests cover immediate start, queued pending, and hard rejection cases without relying on manual load testing.
check_commands:
  - 'pytest tests/test_regression_api.py -k "lesson_task or local_asr or pause or terminate or resume or busy or queue"'
depends_on: []
dependency_reason: ""
blocked_by: []
notes_for_after: Implement the cap in backend admission, not only in UI. Use config-driven defaults in app/core/config.py, count task states from lesson_generation_tasks, and only spawn the worker thread when the task is admitted to run now. If queued tasks are introduced, make the queue semantics explicit in the stored task status and API detail so the frontend can reason about them later even if this task does not change the UI copy.
result_summary: Added config-driven lesson task admission caps and queue backpressure across upload plus local-ASR creation, exposed machine-readable admission metadata in create and task polling responses, and covered admitted, queued, rejected, pause/resume, terminate, and local-ASR regression paths.
