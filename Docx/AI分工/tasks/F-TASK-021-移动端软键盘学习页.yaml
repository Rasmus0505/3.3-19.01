conflicts_with: []
notes_for_after: |
  本任务核心是“系统软键盘可用性”，不要把它扩展成重新设计学习页。

  1. 输入与焦点：
     - 保留现有隐藏输入框驱动方案。
     - 加强移动端自动聚焦、失焦恢复、点击页面后重新拉起键盘的稳定性。
     - 如需区分移动端与桌面端，请在 `ImmersiveLessonPage.jsx` 内局部判断，不要引入新的全局状态。

  2. 视口与遮挡：
     - 使用 `visualViewport` 或等价可靠方案处理键盘弹出后的高度变化。
     - 让输入区和当前句在键盘弹出时可见，必要时做滚动或底部留白补偿。
     - `immersive.css` 中与高度相关的规则需避免仅靠 `100vh`。

  3. 布局边界：
     - 手机竖屏是第一优先，平板其次，手机横屏只做不坏。
     - 不新增页面内虚拟键盘，不改外接键盘快捷键定义。

  4. 回归保护：
     - 不改变字幕遮挡板、视频播放同步和桌面端沉浸式学习的核心交互语义。
     - 若为移动端加入额外样式类或 data 属性，保持 JSX 结构改动最小化。
result_summary: 完成沉浸式学习页移动端软键盘适配，补齐触屏设备焦点恢复、visualViewport 重排与键盘遮挡补偿，并修正横竖屏切换时的视口基线判断。
