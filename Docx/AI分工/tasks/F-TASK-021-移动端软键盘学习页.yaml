title: 移动端软键盘学习页适配
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 完成沉浸式学习页在手机与平板上的系统软键盘、输入焦点与视口重排适配，确保进入学习后可稳定自动弹出键盘并持续作答。
scope:
  - 沉浸式学习页隐藏输入框与焦点保持
  - 软键盘弹出后的可视区域重排与遮挡保护
  - 移动端视口高度、滚动位置与输入区显隐控制
  - 手机横屏保底与桌面端快捷键回归保护
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - frontend/src/features/immersive/immersive.css
acceptance:
  - 手机竖屏与平板设备进入可输入状态后，系统软键盘必须自动弹起；输入焦点不得在正常点击、切句、自动重播后频繁丢失。
  - 键盘弹出后，当前作答区域、当前句和必要操作按钮保持在可视区域内；不得出现主要输入内容被键盘完全遮挡且用户无法恢复的状态。
  - 学习页必须根据真实可视视口高度完成重排，避免仅依赖 `100vh` 导致的底部空白、内容跳动或输入区被遮挡。
  - 手机横屏仅做保底：不得出现布局损坏、无法输入、无法退出学习或主要控件不可点击。
  - 桌面端现有快捷键与沉浸式学习主流程不得退化；移动端不要求新增屏幕虚拟键盘或外接键盘专用交互。
  - `npm --prefix frontend run build` 与 `npm --prefix frontend run build:app-static` 均通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
