notes_for_after: 当前实现已经有单块 translationMask、四角缩放、位置尺寸持久化和毛玻璃样式；本轮不要重做这些基础能力，而是修正“可放置区域”和“层级遮挡”被绑死的问题。现有 `updateTranslationMaskMetrics` 通过 `typingPanelRef` 把可活动高度直接裁到答题区上沿之前，这与用户真实目标相反；需要让遮挡板几何仍可落到答题区上缘附近，但改用层级顺序保证答题区始终压在遮挡板之上、遮挡板再压在视频之上。悬停显隐只做临时 UI 状态，不要写入学习设置；鼠标离开遮挡板 1.2 秒后隐藏板内文案和四角拉伸控件，重新进入立即恢复。隐藏态只收起编辑 chrome，毛玻璃遮挡本体必须继续存在，且再次悬停后仍能继续拖动与缩放。本轮仍只影响影院全屏，不扩展到普通沉浸页。
result_summary: 已解除字幕遮挡板对答题区上缘的活动范围硬裁剪，改为通过层级让答题区始终压在遮挡板之上，并补上闲置 1.2 秒后仅保留毛玻璃效果、重新悬停立即恢复编辑控件的交互。
