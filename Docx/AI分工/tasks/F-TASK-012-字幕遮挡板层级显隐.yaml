schema_version: 1
task_id: TASK-012
title: 字幕遮挡板层级显隐
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 让影院全屏中的字幕遮挡板允许落到答题区上缘附近的遮挡带，同时始终保持在答题区层级之下、视频层之上，并在鼠标离开 1.2 秒后自动收起编辑控件与文案，只保留毛玻璃遮挡效果
scope:
  - 沉浸学习影院全屏中的字幕遮挡板可活动区域与视频、答题区层级关系
  - 字幕遮挡板悬停态、闲置态的文案与四角缩放控件显隐
  - 遮挡板拖动缩放、毛玻璃样式与影院全屏交互回归验证
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - frontend/src/features/immersive/immersive.css
acceptance:
  - 遮挡板不再因为答题区边界被硬性裁到更高位置，用户可以把它放到答题区上缘附近的遮挡带；但最终层级必须始终保持为视频在最下、遮挡板在中间、答题区在最上，答题区现有按钮和输入交互不得被遮挡板抢占
  - 鼠标位于遮挡板上方时显示“字幕遮挡板”文案与四个角拉伸控件；鼠标离开遮挡板 1.2 秒后自动隐藏这些编辑辅助元素，仅保留毛玻璃遮挡效果；鼠标重新进入后立即恢复显示
  - 编辑辅助元素隐藏后，遮挡板原有整块拖动、四角缩放和再次进入后继续编辑的能力仍然可用，不得因为闲置态收起而丢失操作入口
  - 遮挡板逻辑仍只在影院全屏视频里生效，现有播放、上一句、下一句、重播、暂停继续、生词本和答题流程不得因本轮层级与显隐调整回归失效
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
