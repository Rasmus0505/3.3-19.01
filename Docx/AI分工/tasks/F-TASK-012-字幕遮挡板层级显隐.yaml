fix_request: 用户要求继续返工 TASK-012：遮挡板可以放到答题区上缘附近那段区域，但层级必须保持在答题区下方、视频上方；鼠标离开遮挡板 1.2 秒后隐藏四角拉伸控件和“字幕遮挡板”文案，只保留毛玻璃效果，鼠标重新回到遮挡板上方后再恢复这些编辑辅助元素。
fix_reason: 当前交付把遮挡板可活动区域继续与答题区边界硬绑定，导致用户无法把遮挡板放到真实想遮住字幕的位置；同时文案和四角控件常驻，视觉干扰仍然过强。用户真正要的是一块能靠近答题区上缘但不挡住答题区交互、闲置时只保留模糊效果、再次悬停才显出编辑控件的字幕遮挡板。
fix_round: 3
