schema_version: 1
task_id: TASK-004
title: 修复沉浸学习生词本的多选切换与拖动翻转交互
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 修复沉浸学习里上一句生词选择交互，使用户可以通过单击和长按拖动按 token 维度逐个切换选中状态，并把当前所有已选 token 按原句顺序拼成一条记录加入生词本。
scope:
  - 沉浸学习页上一句区域的生词选择状态模型与指针手势
  - 生词本加入按钮的提交语义与选中文本拼接规则
  - 上一句 token 的可点击视觉提示与轻量样式反馈
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - app/static/assets
acceptance:
  - 单击某个未选中的 token 时，只切换该 token 为选中，且不清空此前已经选中的其他 token。
  - 单击某个已选中的 token 时，只取消该 token 的选中状态，其他已选 token 保持不变。
  - 长按进入拖动手势后，指针每次经过一个 token 都立即翻转该 token 的当前选中状态；同一次拖动中如果再次经过同一个 token，需要再次翻转，而不是忽略重复经过。
  - 当前选区不再受连续区间限制，允许同时保留多个离散 token；加入生词本时把所有已选 token 按它们在原句中的先后顺序用空格拼成一条 `entry_text`，不按点击先后重排。
  - 点击“加入生词本”时始终只提交一条记录；仅选中 1 个 token 时提交 `word`，选中多个 token 时无论是否连续都提交 `phrase`。
  - 第一句没有上一句时，整套上一句选词入口继续隐藏；原有“加入生词本”按钮显隐、成功提示、重复更新提示和加入后清空选择的行为保持可用。
  - 上一句 token 默认呈现极淡的灰色底座并显示手型光标，用户能明显感知“这里可点”，但不能把视觉重点抢走或明显抬高答题区的存在感。
  - 鼠标、触屏和触控板等 pointer 输入设备尽量遵循同一套切换语义，不再出现桌面可点而触屏失效或行为明显不同的情况。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
  - 'pytest tests/test_regression_api.py -k "wordbook"'
