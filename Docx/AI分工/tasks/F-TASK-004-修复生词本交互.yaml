notes_for_after: 这是对已交付 TASK-004 的第二轮返工，不要沿用当前 `start/end` 连续区间模型。实现应改为按 token 维度维护选中集合或等价结构，使单击成为单 token toggle，长按拖动成为“按经过顺序逐词翻转”的 sweep toggle。拖动过程中不要偷偷退化成连续高亮区间；如果轨迹再次扫过同一个 token，就再次翻转，结果以用户真实轨迹为准。提交时把所有已选 token 按原句 index 升序拼接为一条记录，`entry_type` 规则固定为 1 个 token=word，多于 1 个 token=phrase。继续复用现有 `/api/wordbook/collect` 接口，不新增后端接口或数据结构。视觉上只做非常轻的可点击提示：手型光标和比白底略灰一点的 token 底座即可，不要引入明显色块、额外工具栏或占用更多垂直空间。
result_summary: Reworked previous-sentence wordbook selection into per-token toggle state with discrete multi-select submission while keeping the existing collect API and hidden first-sentence entry behavior.
