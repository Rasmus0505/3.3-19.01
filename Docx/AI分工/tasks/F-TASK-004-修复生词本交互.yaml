fix_request: 用户反馈当前沉浸学习生词本交互仍然不符合真实采词方式：单击其他单词不应清空之前已选项，单击已选单词应只取消该词；长按拖动时应按经过轨迹逐个翻转 token，允许一次手势中多次经过同一 token 并再次翻转。最终要把当前所有已选 token 按原句顺序拼成一条记录提交，而不是只支持连续区间或只保留最后一个单词。
fix_reason: 已完成版本仍然建立在连续区间选择模型上，只能表达单点或一段连续短语，无法表达用户在复习上一句时更自然的“看到哪个词就点哪个、扫到哪个就切哪个”的采词行为，因此交互方向仍然偏离真实目标，需要在不改后端接口的前提下重做前端状态模型与指针语义。
fix_round: 2
fix_result_summary: Replaced the continuous range model with per-token toggle and sweep-flip behavior, then submitted selected tokens in sentence index order as one word or phrase entry.
