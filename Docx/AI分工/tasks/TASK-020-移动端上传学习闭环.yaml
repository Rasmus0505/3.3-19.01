schema_version: 1
task_id: TASK-020
title: 移动端上传学习闭环适配
status: todo
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 完成普通用户端在手机与平板上的登录、上传、历史与进入学习闭环适配，确保移动浏览器内能稳定从本地文件生成课程并进入学习。
scope:
  - 学习壳层移动端导航与内容容器布局
  - 登录卡片移动端输入与操作区可达性
  - 上传页移动端文件选择、信息密度与默认云端策略
  - 历史页移动端卡片操作与批量操作栏可用性
allowed_paths:
  - frontend/src/app/learning-shell/LearningShellContainer.jsx
  - frontend/src/app/learning-shell/LearningShellHeader.jsx
  - frontend/src/app/learning-shell/LearningShellSidebar.jsx
  - frontend/src/features/auth/AuthPanel.jsx
  - frontend/src/features/upload/UploadPanel.jsx
  - frontend/src/features/lessons/LessonList.jsx
  - frontend/src/index.css
acceptance:
  - 手机竖屏下普通用户端登录、上传、历史页面不得出现横向滚动；主要按钮与主要状态信息在首屏或一次自然滚动内可达。
  - 上传页在移动设备上必须优先走云端可用路径：从本地相册、文件或网盘选择音视频后，可直接发起课程生成；不得把浏览器本地 ASR 作为移动端默认主路径。
  - 保留现有抽屉导航方案，不改为底部导航；手机和平板上能稳定切换上传、历史、兑换码等普通用户入口，且不纳入管理后台移动端适配。
  - 历史页课程卡片在手机上必须能完成继续学习、重命名、删除、恢复本地媒体等高频操作，不依赖悬停交互；批量操作栏在窄屏下仍可见且不遮挡主要内容。
  - 桌面端既有上传与历史主流程不得退化，且不得在本任务中改动浏览器端本地 ASR 路由启用逻辑。
  - `npm --prefix frontend run build` 与 `npm --prefix frontend run build:app-static` 均通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
depends_on: []
dependency_reason: ""
blocked_by: []
conflicts_with:
  - TASK-018
notes_for_after: |
  本任务聚焦“移动端闭环可用”，不要顺手扩展到 PWA、管理后台、录音直传或浏览器端本地 ASR 路由重做。

  1. 壳层与导航：
     - 保留现有 `Sheet` 抽屉导航，不引入底部 Tab。
     - 调整 header、container 和 sidebar 的移动端间距、宽度与按钮可点区域，保证手机竖屏可操作。

  2. 登录页：
     - 优先解决输入框、按钮与提示文案在窄屏下的可读性和可点性。
     - 可使用 `inputMode`、`autoCapitalize` 等移动端输入属性，但不要改变登录/注册接口行为。

  3. 上传页：
     - 重点是移动端布局、文案与默认交互，不是 ASR 能力重构。
     - 若需要在移动端弱化浏览器本地 ASR 入口，只能做展示层与默认选择层面的调整；不得修改 `TASK-018` 负责的浏览器端本地 ASR 启用与路由决策。
     - 文件选择区、任务状态卡、进度区、生成按钮需要在手机上顺序清晰、可连续操作。

  4. 历史页：
     - 优先保证课程卡片在窄屏下信息分层清楚，操作按钮可直接点按。
     - `Popover` / 对话框在手机上要注意位置与可关闭性，不要让操作面板贴边溢出。

  5. 回归边界：
     - 不改管理后台路由。
     - 不修改 `frontend/src/shared/media/localAsrAssetManager.js` 及其他 TASK-018/桌面端本地 ASR 资产文件。
