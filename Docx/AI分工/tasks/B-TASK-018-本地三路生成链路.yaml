acceptance:
  - 上传页中的 Bottle 1.0 不再被硬编码为单一路径；界面必须能明确表达并切换“本地电脑跑 / 本地网站跑 / 服务器跑”三种运行位点，且所选位点会反映到实际调用链和运行时标记，而不是静默回退到云端。
  - 在非 Electron 的本地网站模式下，Bottle 1.0 生成时不得再调用云端 `/api/lessons/local-asr/audio-extract` 或云端 `/api/lessons/tasks/local-asr` 继续生成；本地运行完成后的结果必须带有本地运行标记，例如 `runtime_kind` 或 `asr_raw.mode` 为本地值而非云端值。
  - 在 Electron 模式下，Bottle 1.0 必须继续使用用户机器上的本地 helper 完成抽音频、ASR 和本地课程生成，不得只在 helper 里做 ASR 再把结果回传到云端任务接口。
  - 显式选择“服务器跑”时，Bottle 1.0 仍可保留现有云端路径；Bottle 2.0、登录、钱包和管理后台行为不得因本任务回归受损。
  - `preview-local.bat` 与配套说明必须提供一个可运行的“本地网站跑”入口，使本地预览绑定到本机运行时，而不是仅启动一个脱离业务后端的 `vite preview` 静态页面。
  - `npm --prefix frontend run build`、`npm --prefix frontend run build:app-static`、`npm --prefix desktop-client run build` 以及 `pytest tests/test_desktop_local_asr.py tests/test_regression_api.py tests/test_desktop_runtime_contract.py tests/test_start_script_smoke.py` 全部通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
  - npm --prefix desktop-client run build
  - pytest tests/test_desktop_local_asr.py tests/test_regression_api.py tests/test_desktop_runtime_contract.py tests/test_start_script_smoke.py
