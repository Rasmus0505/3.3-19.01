title: 打通 Bottle 1.0 本地三路生成链路
status: blocked
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 让 Bottle 1.0 在上传页可明确选择“本地电脑跑 / 本地网站跑 / 服务器跑”三种运行位点；其中桌面客户端与本地网站两种本地模式在生成素材时必须在用户机器完成抽音频、ASR 与本地课程生成，不再把本地识别结果回传云端继续生成。
scope:
  - 上传页 Bottle 1.0 运行位点选择、状态展示与路由决策
  - 桌面本机与本地网站的 Bottle 1.0 本地生成接口和 runtime_kind 契约
  - 本地生成结果落到现有本地课程/字幕链路，不再依赖云端 `/api/lessons/tasks/local-asr`
  - 本地网站启动入口、桌面 helper 契约与回归测试
