blocked_reason: >-
  当前任务要求 Bottle 1.0 在桌面客户端与本地网站两种本地模式下都完成抽音频、ASR、课程生成，并且不再把本地识别结果回传云端继续生成。仓库现状里，前端三路切换、本地 helper 接口和本地 `/api/lessons` 接管可以在允许路径内补齐，但“本地课程生成”仍直接依赖 `LessonService.generate_from_local_asr_payload` 的翻译与计费链路，而这条链路默认需要服务端 `DASHSCOPE_API_KEY`、本地账户/钱包语义和本地课程库归属策略。任务定义没有明确本地模式应当采用哪一种翻译与计费方案：是要求纯离线本地 MT、允许用户自配 API key、还是允许生成仅原文字幕的 partial success 课程；也没有明确本地 helper 是否要正式接管 `/api/lessons` 的历史与详情读写而不是只负责生成入口。若继续实现，只能做成“本地识别 + 缺失翻译/计费语义的伪本地生成”，会偏离当前 goal。需要 before 补充并收紧这三个前提：1）本地模式的翻译策略；2）本地模式的钱包/计费/用户归属策略；3）本地 helper 是否接管本地 lessons 全链路。
