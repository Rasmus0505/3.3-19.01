notes_for_after: |
  这次不要再把任务理解成“只把浏览器端 ASR 开关从 false 改成 true”。用户真正要的是把 Bottle 1.0 的生成压力从服务器挪到用户机器，因此本任务要收口成“本地生成链路”而不是“本地 ASR 试玩链路”。

  1. 上传页与运行位点：
     - 统一整理 Bottle 1.0 的运行位点常量，至少区分 `desktop_local`、`browser_local`、`cloud` 三类。
     - UploadPanel / asrStrategy 中不得再把 Bottle 1.0 默认视为“桌面本机或云端二选一”；本地网站模式要成为一条真实可执行的路径，而不是隐藏状态。
     - 选中本地模式时，前端不能继续走“本地识别 + 云端生成”的旧链路。

  2. 本地课程生成接口：
     - 复用现有 `LessonService.generate_from_local_asr_payload`、`create_lesson_task_from_local_asr` 和本地 runtime 标记能力，把“本地 ASR 结果继续生成课程”放到用户机器侧完成。
     - 本地结果要明确区分 `desktop_local` 与 `browser_local`，并在任务/课程结果里保留对应 `runtime_kind` 或 `asr_raw.mode`。
     - 不要把本地模式实现成再次回传云端 `/api/lessons/tasks/local-asr`。

  3. 桌面客户端路径：
     - `run_desktop_backend.py`、`desktop_asr.py`、Electron helper allowlist 与 preload 需要补齐本地生成所需的 helper 合同，不能只保留资源接口和单次 ASR。
     - 主窗口是否继续加载云端站点可以保持当前架构，但 Bottle 1.0 的本地生成链路必须完整落在 helper / 用户机器。

  4. 本地网站路径：
     - `preview-local.bat` 不能再只是 `vite preview` 静态预览；要让本地网站能连到本机运行时。
     - 如果实现上需要通过本地后端承接本地课程生成，优先复用现有 Python/FastAPI 业务代码，避免新造一套与现有 `LessonService` 脱节的生成逻辑。

  5. 存储与回归：
     - 本地模式生成出来的课程/字幕要落到现有本地课程或字幕存储链路，保证后续沉浸学习可直接消费，不要求先回云端建课。
     - 回归测试至少覆盖：桌面本地 ASR 合同、本地任务 runtime_kind 保留、本地 helper 启动烟测、本地网站入口不再只是裸静态预览。
     - 不要顺手扩展到无关的部署、管理员、Bottle 2.0 计费或安装器外观改造。
