conflicts_with: []
notes_for_after: |
  本任务主要修改 CSS 文件，ImmersiveLessonPage.jsx 只做必要的布局状态计算改动。

  1. 竖屏布局（沉浸式.css）：
     - 在现有 `@media (max-width: 768px)` 块之后新增竖屏专用规则：
       ```css
       @media (max-width: 767px) and (orientation: portrait) {
         .immersive-media { min-height: 44vh; }
         .immersive-typing--cinema { bottom: env(safe-area-inset-bottom, 16px); }
         .immersive-letter-cell { font-size: min(5vw, 22px); }
         .immersive-translation-mask { width: min(85%, 400px); height: min(15vh, 80px); }
       }
       ```
     - 将现有的 `@media (max-width: 768px)` 规则中的 `.immersive-media { min-height: 210px; }` 改为 `min-height: 44vh`（更灵活）

  2. 横屏平板布局（沉浸式.css）：
     - 新增 `@media (min-width: 768px) and (max-width: 1023px) and (orientation: landscape)`：
       - `.immersive-media`: `max-height: 60vh`，视频 `object-fit: contain`
       - `.immersive-typing--cinema`: 浮动在视频下方（`position: relative`，不 absolute），`max-width: 100%`，`font-size: 18px`
       - `.immersive-translation-mask`: `max-width: min(85%, 560px)`
     - 新增 `@media (min-width: 768px) and (orientation: portrait)`：
       - `.immersive-media`: `min-height: 52vh`
       - `.immersive-typing--cinema`: `font-size: 19px`，底部留足 safe-area

  3. 大屏横屏影院模式（沉浸式.css）：
     - 增强现有的 `.immersive-page--cinema .immersive-typing--cinema` 规则：
       - 增加 `@media (min-width: 1024px) and (orientation: landscape)` 断点：`max-width: 900px`，`font-size: 20px`
     - `.immersive-translation-mask` 在 `@media (min-width: 1024px)` 下：`max-width: 680px`

  4. iPad Safari 全屏兼容性（ImmersiveLessonPage.jsx）：
     - 在 `enterCinemaFullscreen()` 中，针对 iPad Safari（检测 `navigator.userAgent` 包含 `iPad` 且 `navigator.maxTouchPoints > 0`）做特殊处理：
       - 不使用 `requestFullscreen`（iPad Safari 全屏后页面布局会压缩），改用 CSS铺满模式（`isFullscreenFallback = true`）并在 video 元素上同时设置 `webkit-playsinline` 和 `playsInline`
       - 或者：当检测到是 iPad Safari 时，在 video 上移除 `controlsList="nofullscreen"`，让用户通过视频控件的全屏按钮进入真正的视频全屏，而不是进入页面全屏
     - 在 `getFullscreenElement()` 检测逻辑中，正确识别 iPad Safari 的 `webkitIsFullScreen`

  5. 方向切换响应（ImmersiveLessonPage.jsx）：
     - 在 `useEffect` 中通过 `window.matchMedia('(orientation: landscape)')` 监听方向变化
     - 方向变化时重新计算 `measureContainedVideoRect`（现有函数），更新翻译遮挡板位置
     - 在 CSS 中使用 `transition: all 100ms ease` 避免跳变

  6. 控制栏横屏适配（沉浸式.css）：
     - 在横屏平板断点下，`.immersive-header-left--cinema` 保持横向排列，按钮尺寸不小于 36px（触摸友好）
     - `.immersive-typing-toolbar` 在横屏下横向排列两行（快捷键按钮 + 设置按钮）

  7. 回归保护：
     - 不改变全屏 API 的行为（桌面浏览器全屏保持不变）
     - 不改变 ImmersiveLessonPage 的 JSX 结构，只改 CSS 和少量布局逻辑
     - 不改变 `asr_payload` / `localSubtitleStore` 任何数据结构
     - 不改变视频播放的字幕同步逻辑
result_summary: 已完成平板横竖屏沉浸式学习适配，补齐 iPad Safari 全屏兼容、方向切换重排和分断点影院布局。
