title: 平板横竖屏全屏沉浸式学习适配
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
goal: 适配平板设备（768px-1366px）在竖屏和横屏下的全屏视频沉浸式学习体验：竖屏时最大化视频高度并保持操作区域可用，横屏时以接近全屏的方式展示视频；字幕、翻译遮挡板、控制栏在各姿态下均正确显示且不相互遮挡。
scope:
  - 视频容器布局（竖屏/横屏高度与宽度策略）
  - 字幕面板定位与字号适配
  - 翻译遮挡板定位与缩放适配
  - 控制栏响应式布局
  - iPad Safari 全屏 API 兼容性
allowed_paths:
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
  - frontend/src/features/immersive/immersive.css
  - frontend/src/app/learning-shell/LearningShellContainer.jsx
acceptance:
  - 竖屏（宽度 < 768px）：视频高度不低于 44vh；字幕面板铺满底部可见区域，字号不小于 18px；翻译遮挡板高度不小于 48px，宽度不超过视频宽度的 85%。
  - 横屏（768px <= 宽度 < 1024px）：视频占据视口上方 60% 以上；字幕面板浮动在视频下方，不遮挡视频；控制栏在 3 秒无操作后淡出。
  - 横屏（宽度 >= 1024px）：进入影院全屏模式后视频高度不低于 70vh；字幕面板最大宽度 900px 居中，字号不小于 20px；翻译遮挡板最大宽度 680px。
  - iPad Safari 在横屏进入全屏时，不得因 `playsInline` 阻止视频正确显示；不得出现双滚动条；不得出现视频与字幕面板重叠。
  - 切换屏幕方向时，布局应在 100ms 内完成重排，不得出现元素跳变或闪烁。
  - `npm run build` 和 `npm run build:app-static` 均通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
depends_on: []
dependency_reason: ""
