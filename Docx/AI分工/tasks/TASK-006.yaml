notes_for_after: Do not try to force Bottle 1.0 into the existing browser-WASM path. Reuse the existing faster-whisper Python stack to build a Windows local runner under tools/local-bottle1-runner, and treat the server as a result-ingestion plus lesson-building service for this pilot. Use explicit env-driven gating in app/core/config.py, require Windows eligibility in the surfaced pilot UX, and keep the normal upload pipeline unchanged for users outside the gray group.
