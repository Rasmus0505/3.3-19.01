task_context: |
  当前上传页存在多处冗余信息：价格估算包含详细 MT 成本构成说明；模型卡片有 ASR 说明文字、状态说明、"重新准备"按钮、"当前轨道"文字；暂停/终止按钮文案冗长；进度条分成两行显示；"链接生成视频"按钮文案待优化。本次精简为只展示关键信息，参考 SOP 讲解时间 00:00-04:50。
goal: |
  全面精简上传页 UI：
  1. 删除价格估算 Alert 中的"MT 估算：... Tokens/分钟折算，最终以实际翻译 Tokens 为准"说明文字
  2. 模型卡片只展示模型名称（"Bottle 1.0" / "Bottle 2.0"）和价格，移除 subtitle 说明文字和云端状态说明文案
  3. 删除"重新准备"按钮（对应 getUploadCardActionMeta 中的 label）
  4. 模型状态统一为绿色"可用"或红色"不可用"简洁徽章，移除冗长状态标签（如"服务端模型已就绪，可直接生成"、"服务器跑"等）
  5. 移除"当前轨道：服务器跑"等说明文字
  6. 把"链接生成视频"改名为"提取视频"，样式改为蓝色（variant="default"）
  7. 所有操作按钮改为紧凑尺寸（移除全宽 w-full 和 h-11，改为 h-9）
  8. 进度条阶段从 sm:grid-cols-2 xl:grid-cols-4 改为 grid-cols-5 单行横向排列
scope:
