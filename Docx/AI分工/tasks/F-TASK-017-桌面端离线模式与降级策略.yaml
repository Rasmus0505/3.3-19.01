schema_version: 1
task_id: TASK-017
title: 桌面端离线模式与降级识别策略
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
goal: 为桌面客户端建立完整的离线模式和降级识别策略：客户端在无网络或云端服务不可用时能够感知并给出明确反馈，在本地模型未就绪或损坏时自动降级，并在用户因网络或服务原因无法使用云端 ASR 时给出可操作的引导。
scope:
  - 网络连通性检测（云端 API 可达性）
  - ASR 服务降级路径（Bottle 1.0 本地 → Bottle 2.0 云端 → 错误提示）
  - 离线字幕元数据查询（允许无网时查看历史字幕）
  - 用户感知层（当前模式提示、降级原因提示、重试引导）
allowed_paths:
  - frontend/src/features/upload/UploadPanel.jsx
  - frontend/src/features/upload/asrStrategy.js
  - frontend/src/shared/media/localSubtitleStore.js
  - desktop-client/electron/main.mjs
  - desktop-client/electron/preload.mjs
  - tests/test_desktop_runtime_contract.py
acceptance:
  - 客户端应能区分"网络完全断开"、"网络通但云端 ASR 服务不可用"、"本地模型不可用"三种状态，每种状态给出不同的用户提示和降级路径，不能把后端 502 误报为"本地模型就绪"。
  - 在默认自动策略下，当本地 helper 不健康或本地模型未就绪时，客户端应自动尝试切换到 Bottle 2.0（云端）；切换完成后在前端显示临时提示条"本地模型未就绪，已切换到云端模式"，不阻止用户继续使用。
  - 在默认自动策略下，当本地识别中途失败时，客户端应自动重试一次；若重试仍失败，则降级到 Bottle 2.0；若用户明确手动指定本地或云端模式，则必须保留其显式选择，不做静默改写。
  - 当用户选择 Bottle 2.0（云端）但云端返回错误（如 DashScope API 限流、账号余额不足、网络超时）时，客户端应给出可操作的中文错误提示："Bottle 2.0 当前不可用（原因），请稍后重试或尝试本地识别"，而不是直接显示原始 HTTP 错误。
  - 字幕缓存模块必须在现有 IndexedDB 结构上补齐可离线查询所需的元数据，至少能按文件名或更新时间枚举已缓存字幕，而不要求引入全新的不兼容 store 结构。
  - 在无网络时（navigator.onLine === false），客户端应主动禁用所有需要网络的操作（如课程生成、云端计费），同时在界面上显示"当前处于离线模式"横幅；已缓存的字幕和本地已就绪的模型仍可在离线模式下正常使用。
  - 客户端启动后应通过 preload 提供的云端可达性状态在 3 秒内显示离线横幅，而不是等到用户点击某个功能时才告知。
