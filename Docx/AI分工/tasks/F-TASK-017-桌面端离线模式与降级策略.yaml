notes_for_after: |
  本任务只负责云端可达性、自动策略降级、离线横幅和离线字幕查询，不再重复实现 helper 生命周期管理或模型更新流程。

  1. 网络连通性检测（preload.mjs + main.mjs）：
     - Electron 主进程在 `bootstrapDesktopApp()` 后，定时（每 60 秒）调用云端服务器 `GET /api/health`（目标 URL 从 runtime-config.mjs 中读取 `cloud.apiBaseUrl`），维护 `serverReachable: bool` 状态
     - preload 新增 `desktop:get-server-status` IPC，返回 { reachable: bool, lastCheckedAt: string, latencyMs: number | null }
     - 当检测到 server 从 reachable 变为 unreachable 时，通过 IPC 通知前端，前端显示离线横幅

  2. ASR 服务降级路径（UploadPanel.jsx）：
     - 新增 `asrStrategy.ts`（或 `asrStrategy.js`，若 TS 不可用），定义降级优先级：`bottle1_local > bottle2_cloud`
     - 核心函数 `resolveAsrStrategy({ modelKey, localHelperStatus, serverStatus })`：
       - 若 `localHelperStatus.healthy && localHelperStatus.modelReady === true` → 优先返回 `bottle1_local`
       - 若 `localHelperStatus.healthy && localHelperStatus.modelReady === false` → 自动切换 `bottle2_cloud`，并在返回值中携带 `degraded: true, reason: "local_model_not_ready"`
       - 若 `serverStatus.reachable === false` → 返回 `{ strategy: "offline_only", message: "当前无网络，已缓存字幕可在离线模式下查看" }`
       - 若连续 2 次本地识别失败 → 自动降级到 `bottle2_cloud`
     - UploadPanel.jsx 在发起识别前调用 `resolveAsrStrategy()`，根据返回的 strategy 调用对应识别函数，不在组件内硬编码降级判断
     - 仅默认自动策略允许自动降级；用户显式选择本地或云端时保留手动语义

  3. 云端 ASR 错误处理增强（UploadPanel.jsx + 调用的 API 层）：
     - 捕获 `transcribeAudioFile()` 返回的 `asr_result_json.task_status`，若为 `FAILED` 或 `RATE_LIMITED` 或 `INSUFFICIENT_BALANCE`，展示对应中文提示
     - 定义错误码到中文消息的映射：RATE_LIMITED → "Bottle 2.0 请求过于频繁，请稍后重试"；INSUFFICIENT_BALANCE → "Bottle 2.0 账户余额不足，请联系管理员充值或切换到本地识别"；NETWORK_TIMEOUT → "网络连接超时，请检查网络后重试"；INVALID_MODEL → "Bottle 2.0 模型不可用，请切换到 Bottle 1.0 本地识别"
     - 识别失败的错误消息应提供明确可操作引导：要么提示重试，要么提示切换模式，而不是只显示"识别失败"

  4. 字幕本地缓存（localSubtitleStore.js）：
     - 在现有 `lesson_subtitle_variants` 结构上追加元数据，不要凭空切换到新的 `subtitle_records` 命名
     - 允许记录 `source_key`、`runtime_kind`、`source_filename`、`generated_at`、`error_info` 等离线查询所需字段
     - 新增 `listOfflineSubtitles({ searchQuery, limit, offset })` 函数支持无网时检索
     - 新增 `isOffline()` 辅助函数，基于 navigator.onLine 和 serverStatus 综合判断当前是否为离线模式

  5. 离线横幅 UI（UploadPanel.jsx 或新增组件）：
     - 在 UploadPanel 顶部渲染一个非侵入式横幅：离线时显示红色条"离线模式，部分功能不可用"，网络恢复时自动消失
     - 当处于降级模式（local → cloud）时，显示黄色条"本地模型未就绪，已切换到云端模式"，当用户手动切回本地且本地就绪后自动消失
     - 横幅文案应简洁（不超过 30 个中文字符），不应阻断用户操作

  6. 回归保护：
     - 降级逻辑不能破坏现有直接选择 Bottle 1.0 或 Bottle 2.0 的手动行为：若用户明确选择了本地模式且本地不可用，则显示错误而不是静默降级；若用户明确选择云端且云端失败，则显示错误而不是尝试本地
     - 不要改变 asr_payload 的输出 schema
     - 离线缓存不应包含未完成的识别任务（避免脏数据）
result_summary: 完成桌面端云端可达性桥接、上传页离线横幅与自动降级策略接入，并补充离线字幕查询导出与合同测试。
