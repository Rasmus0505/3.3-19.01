conflicts_with: []
notes_for_after: 第一版只做桌面端，不改网页端；在上传页内做“文件/链接”切换，不单开新页面。下载实现按 yt-dlp 思路落地，但第一版不要支持浏览器 cookies、登录态视频、手动 cookie、播放列表或批量链接。优先把本地 helper 下载接口放进现有 `app/api/routers/desktop_asr.py` 这个桌面专用入口里，避免额外引入新的 helper 注册面；如果必须拆新模块，也要同步把 Electron allowlist 与桌面 helper 装配链路补齐。若引入 Python 侧下载依赖，统一补到 `requirements.txt` 与 `requirements-dev.txt`，确保桌面 helper 打包与本地测试都能拿到同一依赖。
result_summary: "桌面端上传面板已接入文件/链接切换，链接模式会调用本地 helper 下载公开单条视频并在下载完成后直接复用现有本机生成链路；同时补齐了 helper 下载任务接口、Electron allowlist 与桌面回归测试。"
