schema_version: 1
task_id: TASK-007
title: Add flowing water progress state to main history lesson cards
status: in_progress
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: Add a lightweight flowing-water progress presentation to the main history lesson cards so users can immediately judge course completion at a glance, with blue animated progress for in-progress lessons, sentence-count copy such as 11句/123句, and a green completion state when the course is fully learned.
scope:
  - Main history lesson card presentation in the learning shell
  - Derived progress calculation from existing catalog metadata
  - Card-level visual states for not started, in progress, and completed lessons
allowed_paths:
  - frontend/src/features/lessons
  - frontend/src/index.css
  - app/static/assets
acceptance:
  - The main history lesson cards display progress copy in the form 已完成句数/总句数 using existing catalog-backed lesson progress data, including 0句/总句数 for lessons that have not started.
  - In-progress lessons render a horizontal blue water-style fill area with subtle motion that reflects completed_sentence_count divided by sentence_count without obscuring the card title, metadata, selection controls, or action buttons.
  - Lessons whose completed sentence count reaches the total sentence count switch to a clear green completed-card state while keeping the course card interactive, readable, and visually distinct from in-progress cards.
  - Lessons with missing or zero total sentence counts degrade safely without NaN text, broken widths, unreadable contrast, or broken card layouts.
  - Existing history-card behaviors, including start lesson, bulk selection, rename, delete, restore media, and load-more flows, continue to work without regression.
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
