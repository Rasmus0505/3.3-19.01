dependency_reason: ""
blocked_by: []
notes_for_after: Keep this task limited to the main history list, not LessonListLocalSubtitles. Reuse the existing lessonCardMetaMap catalog data instead of adding a backend API change. Prefer a CSS-based implementation with lightweight layered gradients or masks rather than introducing a liquid-gauge dependency. Preserve mobile readability and keep the primary emphasis on the continue-learning action; the water effect is supporting feedback, not the main interaction surface.
