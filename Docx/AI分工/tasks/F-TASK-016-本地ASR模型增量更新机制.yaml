title: 本地 ASR 模型增量更新机制
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
goal: 为桌面客户端建立服务器端模型版本感知和客户端增量更新链路：客户端每次启动时检查服务器是否有新模型版本，若有则增量下载差异文件（而不是每次都下载整个 zip 包），并能回滚到上一个可用版本。
scope:
  - 服务器端模型版本元数据端点（manifest + hash）
  - Electron 端增量更新检查（启动时 + 手动触发）
  - 客户端文件级 diff 和增量下载
  - 版本快照与回滚支持
allowed_paths:
  - desktop-client/electron/main.mjs
  - desktop-client/electron/preload.mjs
  - desktop-client/electron/helper-runtime.mjs
  - desktop-client/electron/runtime-config.mjs
  - desktop-client/electron/model-updater.mjs
  - scripts/run_desktop_backend.py
  - app/api/routers/local_asr_assets.py
  - app/services/faster_whisper_asr.py
