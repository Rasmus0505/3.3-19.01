  - frontend/src/shared/media/localAsrAssetManager.js
  - frontend/src/shared/lib/asrModels.js
  - tests/test_desktop_runtime_contract.py
  - tests/test_desktop_installer_contract.py
  - tests/test_start_script_smoke.py
acceptance:
  - 服务器端现有模型下载摘要接口必须继续兼容旧客户端；同时新增单独的 manifest 能力，返回 `model_version`、文件列表及每个文件的 `sha256`，供桌面端做增量对比。
  - 桌面客户端启动后必须能够非阻塞检查模型版本差异，并将“检查更新 / 开始更新”能力通过 Electron preload 暴露给前端。
  - 增量更新时，客户端对比本地 manifest 和服务器 manifest，找出缺失文件（`missing_in_local`）和已变更文件（`changed`，通过 sha256 对比），只下载这些文件，而不是重新下载整个模型包；下载完成后更新本地 `.model-version.json`。
  - 客户端应保留上一版本的模型快照（`model-dir/.backup/` 目录），更新失败时自动回滚到上一个可用版本，并把失败原因反馈给前端。
  - 模型更新过程应显示文件级进度（总文件数、已下载文件数、当前文件），并可被用户主动取消且不破坏现有模型。
  - 若用户在模型更新中途取消，客户端应能检测到下载不完整（通过 manifest 比对），并在下一次启动时自动重新下载缺失文件。
