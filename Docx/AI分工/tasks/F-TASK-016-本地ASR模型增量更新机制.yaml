notes_for_after: |
  本任务在服务器端只增加只读的模型 manifest 端点，不改变现有 ASR 转写逻辑。以下是需要实现的改进点：

  1. 服务器端模型 manifest 增强（local_asr_assets.py + faster_whisper_asr.py）：
     - 在 `_bundle_summary()` 中增加 `model_version` 字段：优先从 `FASTER_WHISPER_MODEL_DIR/.model-version.json` 读取，若无则用当前 `FASTER_WHISPER_MODELSCOPE_MODEL_ID` + 文件最后修改时间生成一个回退版本字符串
     - 在 `_bundle_files()` 返回的每个文件条目中增加 `sha256` 字段（用 hashlib 计算文件 SHA256）
     - 新增端点 `GET /api/local-asr-assets/download-models/{model_key}/manifest`，返回结构化的 manifest（model_version、total_size_bytes、file_count 和文件列表含 name/size_bytes/sha256），用于客户端增量对比

  2. Electron 端增量更新检查（main.mjs）：
     - 在 `bootstrapDesktopApp()` 成功后（非阻塞），调用服务器 `GET /api/local-asr-assets/download-models/faster-whisper-medium/manifest` 获取最新 manifest
     - 若能读取本地 `model-dir/.model-version.json`，则对比 `model_version` 字段；若相同则跳过更新；若不同则触发增量更新
     - 在 Electron 主进程的 `desktopRuntimeConfig.local.modelDir` 对应目录中读写 `.model-version.json`（通过 Node.js fs）
     - 增量更新过程通过 Electron IPC 通知前端，前端弹出模态进度条显示更新状态；更新完成或失败后立即写回 `.model-version.json`
     - 新增 IPC `desktop:check-model-update` 和 `desktop:start-model-update`，用于前端手动触发更新检查

  3. 客户端增量下载逻辑（新增 `desktop-client/electron/model-updater.mjs`）：
     - `computeModelUpdateDelta(localManifest, remoteManifest)`：对比两个 manifest，返回 { missing: [], changed: [] }（只含需要重新下载的文件）
     - `downloadModelFile(modelKey, fileName, targetDir, onProgress)`：下载单个文件到目标目录，验证 sha256 后才写入磁盘
     - `performIncrementalModelUpdate(modelKey, remoteManifest, targetModelDir, onProgress)`：按 delta 依次下载 missing 和 changed 文件到目标目录，下载完成后将 remote manifest 写入 `.model-version.json`，失败时从 `.backup/` 回滚
     - `backupCurrentModel(targetModelDir)`：在更新前，将当前 `targetModelDir` 下的所有模型文件复制到 `.backup/` 子目录（只保留一个最新备份）

  4. 回滚逻辑（model-updater.mjs）：
     - 若 `performIncrementalModelUpdate` 任何一步失败（网络错误、sha256 不匹配、磁盘满），立即中止并调用 `rollbackFromBackup(targetModelDir)`：删除损坏文件，从 `.backup/` 恢复，上报更新失败原因
     - 回滚成功后，将 `.model-version.json` 恢复为更新前的版本，并记录错误日志到桌面日志目录
     - 若 `.backup/` 也不可用或损坏，则提示用户手动重新下载整个模型包

  5. 前端集成（UploadPanel.jsx）：
     - 前端在启动时（如组件 mount 时）通过 preload 调用 `desktop:check-model-update`，若检测到有新版本则弹出提示"发现新的 Bottle 1.0 模型，是否更新？"（可取消，默认不阻断用户操作）
     - 若用户确认更新，调用 `desktop:start-model-update`，前端显示模态进度条，更新期间本地识别按钮仍可使用云端 Bottle 2.0，不因更新而阻断用户
     - 更新完成后，前端收到完成通知，刷新模型状态显示

  6. 回归保护：
     - 不要改变现有 `/api/local-asr-assets/status` 的 legacy 返回格式（用于兼容旧客户端）
     - 增量更新不应破坏现有安装版客户端的 Bottle 1.0 预装机制：安装时预装的模型目录中应同时包含 `.model-version.json`（含 installer 版本的 model_version）
     - 模型更新失败不应导致客户端崩溃或进入不可恢复状态；若无法回滚则保持旧模型继续可用
