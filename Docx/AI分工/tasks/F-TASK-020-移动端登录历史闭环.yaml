notes_for_after: |
  本任务聚焦“移动端登录/历史/进入学习闭环可用”，不要顺手扩展到 PWA、管理后台、录音直传或上传页运行位点重做。

  1. 壳层与导航：
     - 保留现有 `Sheet` 抽屉导航，不引入底部 Tab。
     - 调整 header、container 和 sidebar 的移动端间距、宽度与按钮可点区域，保证手机竖屏可操作。

  2. 登录页：
     - 优先解决输入框、按钮与提示文案在窄屏下的可读性和可点性。
     - 可使用 `inputMode`、`autoCapitalize` 等移动端输入属性，但不要改变登录/注册接口行为。

  3. 历史页：
     - 优先保证课程卡片在窄屏下信息分层清楚，操作按钮可直接点按。
     - `Popover` / 对话框在手机上要注意位置与可关闭性，不要让操作面板贴边溢出。
     - 继续学习、开始学习、恢复本地媒体、批量选择等入口都要在手机上可直接触达。

  4. 回归边界：
     - 不改管理后台路由。
     - 不修改 `frontend/src/features/upload/UploadPanel.jsx`、`frontend/src/shared/media/localAsrAssetManager.js` 及其他 TASK-018/桌面端本地 ASR 资产文件。
     - 上传页移动端可用性与三路运行位点变更已经收口到 `TASK-018`，本任务不要再重复触碰上传页。
result_summary: 完成普通用户端移动适配收口：学习壳层头部与抽屉导航压缩为窄屏可点布局，登录卡片输入与按钮区改成手机友好的纵向排布，历史页批量栏与课程卡片操作区改为窄屏无横向滚动且主操作始终可达。
