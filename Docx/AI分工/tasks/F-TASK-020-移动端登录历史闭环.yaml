title: 移动端登录历史学习闭环适配
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 完成普通用户端在手机与平板上的登录、导航、历史与进入学习闭环适配，确保移动浏览器内能稳定完成登录、查看课程并进入学习。
scope:
  - 学习壳层移动端导航与内容容器布局
  - 登录卡片移动端输入与操作区可达性
  - 历史页移动端卡片操作、批量操作栏与进入学习入口可用性
allowed_paths:
  - frontend/src/app/learning-shell/LearningShellContainer.jsx
  - frontend/src/app/learning-shell/LearningShellHeader.jsx
  - frontend/src/app/learning-shell/LearningShellSidebar.jsx
  - frontend/src/features/auth/AuthPanel.jsx
  - frontend/src/features/lessons/LessonList.jsx
  - frontend/src/index.css
acceptance:
  - 手机竖屏下普通用户端登录页与历史页不得出现横向滚动；主要按钮与主要状态信息在首屏或一次自然滚动内可达。
  - 保留现有抽屉导航方案，不改为底部导航；手机和平板上能稳定切换上传、历史、兑换码等普通用户入口，且不纳入管理后台移动端适配。
  - 历史页课程卡片在手机上必须能完成继续学习、重命名、删除、恢复本地媒体等高频操作，不依赖悬停交互；批量操作栏在窄屏下仍可见且不遮挡主要内容。
  - 从历史页进入学习页的主路径在手机与平板上保持稳定可达；课程封面、进度、恢复本地媒体提示和“开始学习/继续学习”按钮不得因窄屏布局而错位、被裁切或失去可点击性。
  - 桌面端既有历史与学习主流程不得退化，且本任务不得改动 `UploadPanel.jsx` 或浏览器端本地 ASR 路由启用逻辑。
  - `npm --prefix frontend run build` 与 `npm --prefix frontend run build:app-static` 均通过。
check_commands:
  - npm --prefix frontend run build
  - npm --prefix frontend run build:app-static
