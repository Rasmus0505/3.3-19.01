task_id: TASK-009
title: Slim production Python requirements for Zeabur
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: Remove clearly non-production Python dependencies from the Zeabur runtime install path and align the deploy docs with the supported Bottle 1.0 and Bottle 2.0 production stack.
scope:
  - Python dependency manifests used for Zeabur runtime versus local dev or test
  - Deployment and local-install docs tied to those manifests
  - Automated contract coverage for runtime manifest contents and supported ASR deployment story
allowed_paths:
  - requirements.txt
  - requirements-dev.txt
  - .env.example
  - README.md
  - zeabur-template.yaml
  - tests/test_dependency_manifest_contract.py
acceptance:
  - requirements.txt contains only production runtime packages needed for the supported startup and request-handling paths, and no longer carries obvious dev or test-only packages such as pytest and httpx.
  - Local development and test installation guidance is preserved through requirements-dev.txt or an equivalent documented secondary install path, so test workflows remain reproducible without putting those packages into the Zeabur runtime layer.
  - Obsolete server-side SenseVoice runtime packages that are no longer needed by the supported transcribe flows are removed from requirements.txt, and the deploy docs or template no longer instruct Zeabur users to provision unused server-side SenseVoice bundles if those packages are removed.
  - An automated check verifies the runtime manifest exclusions and the supported deployment story for Bottle 1.0 and Bottle 2.0, so future changes do not silently reintroduce heavy runtime dependencies.
check_commands:
  - pytest tests/test_dependency_manifest_contract.py
depends_on: []
dependency_reason: ""
blocked_by: []
notes_for_after: Use the repo-inspected contract when slimming requirements: app/api/routers/transcribe.py delegates to app/services/asr_dashscope.py, and app/services/asr_model_registry.py exposes only faster-whisper-medium plus qwen3-asr-flash-filetrans for active transcribe flows. Keep this task focused on manifests, docs, and automated verification; do not broaden it into a general backend refactor.
result_summary: Separated Zeabur runtime requirements from dev/test dependencies, removed stale SenseVoice deployment references, and added a manifest contract test for the supported Bottle 1.0 plus Bottle 2.0 stack.
