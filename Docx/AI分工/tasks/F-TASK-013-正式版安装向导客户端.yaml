notes_for_after: 这次修复不是继续交付 portable，而是改成标准 Windows 安装向导。实现时固定采用 `electron-builder` 的 NSIS 安装器路线，要求非 one-click，可选安装目录，并提供桌面快捷方式、开始菜单入口和安装完成后启动程序。安装器里不要暴露服务器地址或业务环境变量，只保留常规安装项，并额外提供 `Bottle 1.0` 预装勾选项，默认勾选但允许取消。为满足“用户安装后即用”，请固定把本地 helper 改成打包时生成的自带运行时，优先使用 PyInstaller 或等价冻结方案，把 `scripts/run_desktop_backend.py` 及其依赖封成随安装包分发的 helper 可执行文件；打包态不再探测系统 Python，开发态才保留现有 Python 入口。安装版启动后仍然读取用户目录配置并连接既有 Zeabur `web`，不新增 desktop 服务。若你为了让预装的 `Bottle 1.0` 在客户端里可见，需要补桌面检测或上传页状态逻辑，请在同一任务内一并收口，并用新增的 installer contract 测试覆盖“安装包目标、安装器选项、自带运行时、不再产出 portable、Bottle 1.0 默认预装可取消”这些约束。
result_summary: 已将 Windows 桌面端正式收口为 NSIS 安装向导版：`package:win` 现在生成安装版 exe，自带 PyInstaller 本地 helper 运行时，安装器支持 Bottle 1.0 默认勾选且可取消的预装项，并通过打包态 cloud defaults 直接进入现有云端登录页，同时补齐安装版契约测试与回归说明。
