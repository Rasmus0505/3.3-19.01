fix_request: 用户明确要求交付的是“安装向导式 exe 程序”，而不是当前这种 portable 便携版。安装流程应像常见 Windows 软件：运行安装器、选择安装项、安装完成后启动程序并进入登录；安装包需要自带本地 helper 运行时，不要求终端用户再手装 Python；安装器需支持 Bottle 1.0 预装选项，默认勾选但允许取消。
fix_reason: 当前结果虽然完成了云端接入与本地 helper 架构，但最终交付形态仍是 portable，并且打包态依赖用户本机 Python 3.11，不符合“正式版安装程序”的用户预期，也缺少安装向导中的可选安装项。
fix_round: 1
fix_result_summary: 已把交付形态从 portable 改成标准 NSIS 安装向导，并在安装包里打入自带 helper 运行时与 Bottle 1.0 预装选项，桌面端也能识别“已预装 / 未预装可后续准备”的本机资源状态。
