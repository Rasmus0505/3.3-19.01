  - frontend/src/shared/lib/asrModels.js
  - frontend/src/shared/media/localAsrAssetManager.js
  - app/api/routers/local_asr_assets.py
  - README.md
  - requirements-dev.txt
  - tests/test_start_script_smoke.py
  - tests/test_desktop_runtime_contract.py
  - tests/test_desktop_installer_contract.py
acceptance:
  - `npm --prefix desktop-client run package:win` 产出的 Windows 分发物必须是标准安装向导式安装包而不是 portable 便携版；安装向导至少支持安装目录选择、桌面快捷方式、开始菜单入口与安装完成后启动程序。
  - 安装版桌面端在打包态不得依赖用户机器预装 Python 3.11；`package:win` 需先生成并打入自带本地 helper 运行时，安装后的客户端在无系统 Python 的 Windows 机器上也能启动并通过本地 helper 健康检查。开发态仍可继续使用本机 Python。
  - 安装向导必须提供 `Bottle 1.0` 可选预装项，默认勾选但允许用户取消；若保持勾选，安装完成后客户端首次启动即可识别本地 `Bottle 1.0` 资源已就绪；若取消勾选，安装与登录流程仍可正常完成，且客户端清楚显示该模型未预装/可后续准备。
  - 安装器与首次启动流程不得要求用户填写 `DATABASE_URL`、`JWT_SECRET`、`ADMIN_EMAILS`、`DASHSCOPE_API_KEY`、服务器环境等业务配置；安装完成后启动客户端时应直接进入现有云端登录页，桌面端继续连接同一套 Zeabur `web` 与 `postgresql`。
  - 本地 helper 仍只负责健康检查、模型目录、缓存目录、日志目录和本机资源接口，不得重新承载线上账号认证、管理员登录、课程业务写入等云端职责。
  - README 必须改写为安装版交付说明：明确写出 Zeabur 侧仍只维护现有 `web` 与 `postgresql`，无需新建 desktop 服务；同时写清安装包构建方式、安装后默认用户路径、是否预装 Bottle 1.0 的差异，以及终端用户无需单独安装 Python。
