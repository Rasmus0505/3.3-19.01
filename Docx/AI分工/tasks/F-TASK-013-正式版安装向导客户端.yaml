title: 正式版安装向导客户端
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: 将当前 Windows 便携版桌面端改为标准安装向导式正式版客户端：安装包自带本地 helper 运行时，安装完成后用户从已安装程序启动并登录，并可在安装时选择是否预装 Bottle 1.0。
scope:
  - Windows 安装向导与已安装程序入口
  - 本地 helper 自带运行时与打包链路
  - Bottle 1.0 安装时可选预装与安装后状态识别
  - README 与安装版回归契约
