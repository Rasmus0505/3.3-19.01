schema_version: 1
task_id: TASK-026
title: 修复打包态桌面端本机文件路径桥接
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: 上一轮虽然把桌面端“文件/链接”入口和本地 helper 下载任务接上了，但用户现在在实际运行 `desktop/dist/win-unpacked/Bottle.exe` 时，桌面本机链路仍会提示“当前桌面端无法读取本机文件路径，请改用云端运行”。继续维持这种状态会让打包后的正式桌面客户端在最关键的“本地电脑跑”场景里失效，也会让链接导入下载完成后无法稳定复用本机生成链路。本轮修复要补齐打包态桌面端的文件路径桥接，让 Electron 正式运行时能够把用户选择的本地媒体和链接下载后的本地文件路径稳定传给现有 desktop helper。
goal: 修复打包态 Electron 客户端的本机文件路径桥接，让桌面本地文件和链接下载结果都能继续走现有 Bottle 1.0 本机生成流程。
scope:
  - 打包态桌面端的本机文件选择与路径桥接
  - 上传页对桌面本机文件路径的消费与回传
  - 桌面运行时桥接契约与打包回归
allowed_paths:
  - frontend/src/features/upload/UploadPanel.jsx
  - frontend/src/shared/media/localAsrAssetManager.js
  - desktop/electron/main.mjs
  - desktop/electron/preload.mjs
  - app/api/routers/desktop_asr.py
  - app/services/media_url_import.py
  - tests/test_desktop_runtime_contract.py
  - tests/test_desktop_installer_contract.py
acceptance:
  - 运行 `desktop/dist/win-unpacked/Bottle.exe` 或安装包安装后的桌面客户端时，选择本地媒体进入“本地电脑跑” Bottle 1.0 不再出现“无法读取本机文件路径”的报错，而是能把真实 `source_path` 传给现有 `/api/desktop-asr/generate` 链路。
  - 链接模式下载完成后，也必须保留下载产物的本地路径并继续进入现有桌面本机生成流程，不能在下载成功后丢失 `source_path`。
  - 桌面运行时新增的文件选择桥接能力要通过 preload/main 契约暴露给前端，相关契约测试和安装器契约测试要能反映这条能力存在。
  - 网页端上传流程、云端上传流程、现有 `/api/desktop-asr/*` 路由契约不被破坏。
check_commands:
  - pytest tests/test_desktop_runtime_contract.py tests/test_desktop_installer_contract.py -q
  - npm --prefix desktop run build
  - npm --prefix desktop run package:win
  - pytest tests/test_desktop_installer_contract.py -q
  - npm --prefix frontend run build
depends_on: []
dependency_reason: ""
blocked_by: []
conflicts_with: []
notes_for_after: 本轮重点不是继续扩链接下载能力，而是把打包态桌面运行时的“本机文件真实路径”补齐。用户已经明确是在 `desktop/dist/win-unpacked/Bottle.exe` 场景里复现，所以不能只靠浏览器 `<input type=file>` 默认 File 对象；需要按 Electron 正式运行时的边界，在 preload/main 提供受控的本机文件选择桥接，再让上传页和桌面本机生成逻辑消费这个桥接结果。修复时保持网页端不感知 Electron 私有字段，避免把桌面专用实现泄露到普通网页路径里。
result_summary: 桌面端现在通过 Electron preload/main 暴露受控的本机媒体选择与按需读取桥接，上传页在 Bottle 1.0 本机模式会持久化并恢复 `desktop_source_path`，链接下载结果也会保留本地路径继续走现有 `/api/desktop-asr/generate` 链路；同时补齐了运行时/安装器契约测试，并重新完成桌面打包与前端构建校验。
changed_files:
