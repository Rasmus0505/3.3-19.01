schema_version: 1
task_id: TASK-049
title: 数据闭环三个关键bug修复
status: todo
priority: high
goal: 修复 progress 同步键错配、删除课程不写 journal、markSynced 缺失三个直接影响数据可靠性的 bug
scope: desktop/src/sync/sync-engine.mjs、desktop/src/db/local-db.cjs、desktop/src/db/sync-journal.mjs
acceptance:
  - progress 同步查询使用正确的课程主键（courseId），与云端 API 参数名一致
  - 删除课程时在 sync_journals 写入 type='DELETE' journal，确保远端拉取后不会复活
  - 所有 sync_* 操作成功后调用 markSynced，sync_journals 记录可正常收敛
  - sql.js 快照写入 IndexedDB 前检查 DB 状态，初始化失败时给出明确错误而非静默失败
  - 修改前后本地课程创建、删除、同步流程正常，云端进度可正确上传
depends_on: []
conflicts_with: []
notes_for_after: |
  本次为实现任务，需要修改代码。按以下步骤执行：
  1. 阅读 desktop/src/sync/sync-engine.mjs，找到 progress 同步的查询键位置，确认是 course_id 还是其他字段错配
  2. 修复 sync-engine.mjs 中 progress 查询参数，与云端 API 保持一致
  3. 阅读 desktop/src/db/local-db.cjs，找到 deleteCourse 方法
  4. 在 deleteCourse 方法中，补写 type='DELETE' 的 journal 记录（参考 sync-journal.mjs 的 logSync 格式）
  5. 在 sync-engine.mjs 所有 sync_* 成功回调后，补上 db.markSynced() 调用
  6. 检查 sql.js 初始化和快照写入逻辑：在写入 IndexedDB 前增加 DB 健康状态检查，失败时 throw 而非静默
  7. 写完后：手动触发课程删除并检查 sync_journals 有 DELETE 记录；触发进度同步并确认上云；验证恶意快照场景有明确错误
