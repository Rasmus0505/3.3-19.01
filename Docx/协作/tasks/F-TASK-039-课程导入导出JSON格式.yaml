  1. 导出格式设计（.bottle-lesson.json）：
     {
       "schema_version": "1",
       "exported_at": "2026-03-24T12:00:00Z",
       "app_version": "0.2.0",
       "lesson": { "id": "uuid", "title": "...", ... },
       "sentences": [...],
       "progress": { "current_index": 3, "completed_indices": [0,1,2] }
     }
  2. desktop/src/sync/course-export.mjs 实现 exportCourse(lessonId)：从 window.localDb 获取数据，序列化为 JSON，通过 Electron dialog 保存文件
  3. desktop/src/sync/course-import.mjs 实现 importCourse(filePath)：解析 JSON，检查 ID 冲突，写入 window.localDb 和 sync_journals
  4. 前端课程列表页和上传面板增加导入/导出入口。
