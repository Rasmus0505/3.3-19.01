acceptance:
  - 课程列表页每个课程有"导出"按钮，点击后浏览器下载 .bottle-lesson.json 文件
  - 上传面板有"导入课程"入口，支持拖拽或选择 .bottle-lesson.json 文件
  - 导入后课程出现在本地课程列表，包含完整的 sentences 和 progress
  - 导入时若课程 ID 冲突，弹出确认框让用户选择"覆盖"或"新建副本"
  - 导出文件的 JSON Schema 版本记录在文件中，支持后续格式升级
