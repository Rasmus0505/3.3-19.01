notes_for_after: |
  1. 在 desktop/src/db/schema.sql 中新增：
     CREATE TABLE sync_journals (
       id TEXT PRIMARY KEY,
       table_name TEXT NOT NULL,
       record_id TEXT NOT NULL,
       operation TEXT NOT NULL, -- INSERT / UPDATE / DELETE
       version INTEGER NOT NULL DEFAULT 1,
       synced_at TEXT,
       status TEXT NOT NULL DEFAULT 'pending', -- pending / synced / conflict
       local_updated_at TEXT,
       remote_updated_at TEXT
     );
     CREATE TABLE sync_conflicts (
       id TEXT PRIMARY KEY,
       table_name TEXT NOT NULL,
       record_id TEXT NOT NULL,
       local_data TEXT, -- JSON string
       remote_data TEXT, -- JSON string
       detected_at TEXT NOT NULL,
       resolved_at TEXT,
       resolution TEXT -- local / remote / merged / null
     );
  2. 在 desktop/src/db/sync-journal.mjs 中实现：
     - logSync(tableName, recordId, operation, version): 写入 sync_journals
     - getUnresolvedConflicts(): 返回所有 resolved_at IS NULL 的 sync_conflicts 记录
     - resolveConflict(conflictId, resolution): 更新 sync_conflicts.resolved_at 和 resolution
     - getPendingRecords(tableName): 返回 status='pending' 的同步记录
     - markSynced(ids): 将指定 journal ids 标记为 synced
  3. 在 preload 中暴露 window.localDb.sync.* 接口。
  4. 注意：version 字段用于乐观锁，每次本地修改时递增。
