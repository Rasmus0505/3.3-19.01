schema_version: 1
task_id: TASK-032
title: 验证并完善桌面客户端更新检测机制
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  用户表示："每次让 Agent 帮我更新网站后我也不清楚要不要更新客户端，我希望客户端如果需要更新的话会有提示，免得我不知道网站的更新有没有生效到客户端"。

  当前客户端已有更新检测机制（在 desktop/electron/main.mjs 的 checkDesktopClientUpdate 函数中），但依赖服务端提供 /desktop/client/latest.json 端点。需要验证这个机制是否完整，以及 Zeabur 部署后是否能正常工作。
goal: |
  验证客户端更新检测的完整链路：在 Zeabur 部署的网站上，客户端能否正确检测并提示更新。如果服务端缺少 /desktop/client/latest.json 端点，需要在项目中添加该端点或配置指南。
scope:
  - 客户端更新检测前端展示逻辑
  - 服务端更新元数据端点
  - 客户端配置说明文档
allowed_paths:
  - desktop/electron/main.mjs
  - desktop/electron/runtime-config.mjs
  - app/main.py
  - docs/desktop-client.md（如果不存在则新建）
acceptance:
  - 服务端提供 /desktop/client/latest.json 端点（或在文档中说明如何配置）
  - 客户端在启动时检查该端点（如果 cloud.appBaseUrl 配置正确）
  - 客户端检测到新版本时，通过桌面通知提醒用户（Notification API）
  - 用户可以在诊断面板中手动触发"检查更新"
  - 新客户端版本发布后，旧客户端能够检测到更新
check_commands:
  - curl http://localhost:8000/desktop/client/latest.json
  - ""
depends_on: []
dependency_reason: ""
blocked_by: []
conflicts_with: []
notes_for_after: |
  1. 检查 app/main.py 中是否已有 /desktop/client/latest.json 端点，如果没有需要添加。
  2. 该端点应返回符合 desktop/electron/main.mjs extractDesktopClientRelease 函数期望的 JSON 格式：
     - latestVersion: 最新版本号
     - entryUrl: 下载入口 URL（可选）
     - releaseNotes: 更新说明（可选）
  3. 验证 desktop/electron/runtime-config.mjs 中 cloud.appBaseUrl 的配置逻辑，确保客户端能从配置中读取元数据 URL。
  4. 创建一个 docs/desktop-client.md 文档，说明：
     - 如何在 Zeabur 部署时配置客户端元数据端点
     - 如何发布客户端新版本（提供 latest.json）
     - 客户端与服务端版本的对应关系
  5. 在 frontend 中添加一个手动触发检查更新的按钮（在 TASK-031 的诊断面板中）。
