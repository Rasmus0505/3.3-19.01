  - "$env:DESKTOP_CLIENT_LATEST_VERSION='0.3.1'; $env:DESKTOP_CLIENT_ENTRY_URL='https://downloads.example.com/bottle-0.3.1.exe'; @'\nfrom fastapi.testclient import TestClient\nfrom app.main import create_app\n\nclient = TestClient(create_app(enable_lifespan=False))\nmetadata = client.get('/desktop/client/latest.json', follow_redirects=False)\ndownload = client.get('/download/desktop', follow_redirects=False)\nprint('metadata', metadata.status_code, metadata.json())\nprint('download', download.status_code, download.headers.get('location'))\n'@ | python -"
