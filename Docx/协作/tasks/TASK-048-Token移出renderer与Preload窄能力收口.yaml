schema_version: 1
task_id: TASK-048
title: Token移出renderer与Preload窄能力收口
status: todo
priority: critical
goal: 将 access token/refresh token 完全移出 renderer 可见范围，auth 操作全部经由 main 进程代理；将 localDb/syncEngine 原始接口替换为窄能力桥接
scope: desktop/electron/preload.mjs、desktop/src/auth/offline-auth.mjs
acceptance:
  - desktopRuntime.auth 只暴露 isLoggedIn / userId / userName 等脱敏视图，不再暴露 accessToken / refreshToken
  - token 明文仅存在于 main 进程内存，renderer 通过 IPC 调用 auth 相关操作
  - localDb 暴露的不是原始 CRUD 接口，而是业务级窄接口（如 saveCourseWithSentences 而非 saveCourse + saveSentences）
  - syncEngine 对 renderer 只暴露 syncAll / resolveConflict 两个入口，不暴露底层 journal 操作
  - requestLocalHelper 对 renderer 不可直接访问，改为业务级封装方法
  - preload-cloud.mjs（如已创建，TASK-047）进一步收窄为只读/离线功能集
  - 修改前后 renderer 仍可正常登录、离线使用
depends_on: []
conflicts_with: []
notes_for_after: |
  本次为实现任务，需要修改代码。按以下步骤执行：
  1. 阅读 desktop/electron/preload.mjs，找到 desktopRuntime.auth、localDb、syncEngine 的暴露方式
  2. 在 preload.mjs 中将 auth 相关改为只读脱敏视图：isLoggedIn、userId、userName，不暴露 token
  3. 在 main.mjs 中新增 auth 相关 IPC handler（getAuthStatus、login、logout 等），token 读写全部在 main 进程完成
  4. localDb：将桌面级 CRUD 接口改为业务级封装（如 saveCourseWithSentences 包含完整的课程+句子写入事务）
  5. syncEngine：对 renderer 隐藏 markSynced、logSync 等底层 journal 操作，仅暴露 syncAll / resolveConflict
  6. 删除 renderer 可直接调用 requestLocalHelper 的路径，改为业务封装
  7. 如果 preload-cloud.mjs 尚未创建，从 preload.mjs 剥离一个仅含只读功能的最小版本
  8. 修改后测试：本地登录/登出正常、离线模式可用、文件选择正常工作
