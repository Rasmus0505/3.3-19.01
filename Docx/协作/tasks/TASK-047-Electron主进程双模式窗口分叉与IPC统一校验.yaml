schema_version: 1
task_id: TASK-047
title: Electron主进程双模式窗口分叉与IPC统一校验
status: todo
priority: critical
goal: 建立 standalone/cloud-linked 双模式窗口路由，阻止远端页面获取高权限能力；为所有敏感 IPC 插入统一 sender/origin 校验中间件
scope: desktop/electron/main.mjs（窗口创建路由、IPC handler 入口、校验中间件）
acceptance:
  - main.mjs 窗口创建时根据运行模式（standalone/cloud-linked）动态选择加载不同的 preload 脚本
  - standalone 模式：file:// 协议加载，加载全量 preload
  - cloud-linked 模式：远程 URL 加载，仅加载只读/脱敏能力集合的 preload
  - 新增统一 sender 校验函数 assertLocalRenderer，所有敏感 handler 第一行调用
  - shell.openExternal 增加协议白名单校验（只允许 http/https）
  - 审查结果2中所有 critical/high IPC 漏洞均被阻断
  - 修改前后 main.mjs 能正常启动，Helper 健康检查通过
depends_on: []
conflicts_with: []
notes_for_after: |
  本次为实现任务，需要修改代码。按以下步骤执行：
  1. 先完整阅读 desktop/electron/main.mjs，找到窗口创建（BrowserWindow）和所有敏感 IPC handler 的位置
  2. 参考 runtime-config.mjs 中 standalone/cloud-linked 配置的判断逻辑
  3. 新建 desktop/electron/preload-cloud.mjs：从现有 preload.mjs 剥离所有高权限接口，仅保留只读/脱敏能力
  4. 在 main.mjs 头部新增 assertLocalRenderer(event) 校验函数
  5. 在每个敏感 handler 入口第一行调用 assertLocalRenderer(event)
  6. shell.openExternal handler 增加协议白名单（仅 http/https）
  7. 修改 main.mjs 窗口创建的 webPreferences，动态选择 preload 脚本
  8. 修改后运行桌面应用验证启动正常
