notes_for_after: |
  1. 技术栈：Electron + React 18 + TypeScript + Vite（electron-vite 方案）
  2. 复用 frontend/src/ 共享组件（通过相对路径 ../frontend/src/ 或符号链接）
  3. 主进程先只做窗口管理 + 登录状态校验，其他能力（TASK-054）后续逐步加入
  4. 开发模式用 electron-vite 的解包模式（electron 源码直接运行，不打包成 asar）
  5. 打包用 electron-builder，target: nsis（Windows 安装包）
  6. preload 只暴露最小必要 API（login/logout/isLoggedIn 等），不暴露敏感数据
  7. 本次无需执行数据库迁移
