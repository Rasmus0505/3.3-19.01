notes_for_after: |
  1. Sherpa-ONNX Node.js 绑定安装：npm install sherpa-onnx-node（自动从 npm 安装）
  2. 子进程架构：Electron main → child_process spawn Node.js → sherpa_onnx Node.js addon
  3. 通信协议：stdin/stdout JSON-RPC 风格消息
  4. 音频预处理：mp4→wav（16kHz，mono），需要 ffmpeg 在 PATH 中（sherpaAsr.ts）
  5. 模型路径：D:/3.3-19.01/Desktop/models/sherpa-onnx/sense-voice-zh-en-ja-ko-yue/model.onnx
  6. Faster-Whisper 兼容性：asrModels.ts 中预留接口，模型切换不影响主流程
  7. 计费：TASK-054 阶段暂不在前端显示计费扣点，Bottle 1.0 计费逻辑在 TASK-055 后端 STS 凭证阶段处理
  8. 本次无需执行数据库迁移
result_summary: |
  完成了 Bottle 1.0 桌面端本地 ASR 推理的完整集成。核心包括：
  (1) asr_offline_process.js：独立的 Node.js 子进程，运行 Sherpa-ONNX SenseVoice 模型，通过 JSON-RPC over stdin/stdout 与主进程通信，支持 init/transcribe/healthcheck 三个方法。
  (2) asrProcess.ts：Electron 主进程的子进程管理器，负责 spawn/restart/JSON-RPC 通信/崩溃恢复（最多3次重启），以及 IPC handler 注册（asr:start/asr:transcribe/asr:healthcheck/asr:stop）。
  (3) sherpaAsr.ts：高层封装，负责音频格式转换（调用 ffmpeg）和进度回调。
  (4) DesktopUploadPanel.tsx：桌面端上传面板，支持文件选择、本地识别、Bottle 2.0 占位符。
  (5) 后端集成：在 asr_model_registry.py 中添加 sense-voice-local 模型支持，在 auth.py 中添加桌面端令牌登录端点。
  (6) 打包配置：electron-builder.json 配置 asarUnpack，确保 addon/、models/、sherpa-onnx-node 在打包后处于 app.asar.unpacked 目录，ASR 子进程通过 NODE_PATH 和正确的相对路径找到它们。
