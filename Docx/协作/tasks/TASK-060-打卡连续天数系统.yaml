notes_for_after: |
  1. 本次需要执行数据库迁移（新增 DailyCheckin 表、User 三个字段、LessonProgress 一个字段）
  2. 打卡触发时机：ImmersiveLessonPage mount 时检查 localStorage 中今日打卡标记，无则调用 API
  3. 补签卡发放时机：POST /api/checkin/record 时检查 streak_count 是否为7的倍数，是则 freeze_cards+1（上限3）
  4. 打卡时间区：统一使用 UTC+8（北京时间），在 Python 中用 pytz 或 datetime.timezone(timedelta(hours=8))
  5. 需要运行 PostgreSQL 迁移：alembic revision --autogenerate + alembic upgrade head
  6. API 认证：需要登录状态（get_current_user），未登录返回空状态（streak=0, freezeCards=0, todayChecked=false）
