schema_version: 1
task_id: TASK-060
title: 打卡连续天数系统
status: pending
priority: critical
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  产品新增打卡连续天数功能，强化用户每日学习习惯。
  业务规则（已与产品经理确认）：
  - 打卡触发：每天首次进入沉浸式学习页即打卡
  - 补签机制：多邻国风格 — 连续7天获得1张补签卡，最多存3张，断签时自动消耗补签卡补上昨天
  - 未登录用户显示「—」
  - 显示位置：① 侧边栏品牌区右侧 ② 页面顶部Header标题左侧
goal: 打卡天数正确计算、补签卡机制生效、两处显示打卡天数
scope:
  - 后端数据模型（新建 app/models/checkin.py）：
    * DailyCheckin 表：id、user_id、checkin_date（唯一索引）、is_supplemented（是否用补签卡补）、created_at
    * User 模型新增字段：streak_count（当前连续天数）、freeze_cards（补签卡数量）、last_checkin_date
    * LessonProgress 模型新增字段：last_active_date（用于判断每天首次进入）
  - 后端API（新建 app/api/routers/checkin.py）：
    * GET /api/checkin/status — 获取打卡状态（连续天数、补签卡数、今日是否已打卡）
    * POST /api/checkin/record — 记录打卡（同时判断是否需要用补签卡补昨天）
    * POST /api/checkin/record 逻辑：获取今日打卡记录 → 若无则判断昨天是否打卡 → 若昨天未打卡且有补签卡则自动消耗1张补签卡补昨天 → 记录今天打卡
  - 后端服务（新建 app/services/checkin_service.py）：打卡逻辑、补签卡发放/消耗逻辑
  - 前端 Zustand store（新建 frontend/src/store/slices/checkinSlice.ts）：打卡状态、fetchCheckinStatus
  - 前端侧边栏（frontend/src/app/learning-shell/LearningShellSidebar.jsx）：
    * SidebarHeader 品牌区右侧加 StreakBadge（Flame 图标 + 天数，小字体）
  - 前端页面顶部（frontend/src/app/learning-shell/LearningShellHeader.jsx）：
    * 标题左侧加打卡天数（小字体，金色/橙色）
  - 前端打卡触发（frontend/src/features/immersive/ImmersiveLessonPage.jsx）：
    * useEffect 中检测是否今日首次进入，若是则调用 POST /api/checkin/record
allowed_paths:
  - app/models/checkin.py（新建）
  - app/models/user.py（修改）
  - app/models/lesson.py（修改）
  - app/api/routers/checkin.py（新建）
  - app/services/checkin_service.py（新建）
  - app/api/__init__.py（注册路由）
  - frontend/src/store/slices/checkinSlice.ts（新建）
  - frontend/src/app/learning-shell/LearningShellSidebar.jsx
  - frontend/src/app/learning-shell/LearningShellHeader.jsx
  - frontend/src/features/immersive/ImmersiveLessonPage.jsx
acceptance:
  - 用户每天首次进入沉浸式学习页，打卡天数+1
  - 连续7天后，补签卡+1（最多3张）
  - 断签时，若有补签卡则自动补上昨天，连续天数不中断
  - 侧边栏和页面顶部Header均显示正确天数
  - 未登录用户不显示打卡天数
check_commands:
  - cd D:/3.3-19.01 && pytest -q
  - cd D:/3.3-19.01/frontend && npm run dev
