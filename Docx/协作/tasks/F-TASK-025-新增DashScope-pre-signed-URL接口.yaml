goal: >
  新增 app/api/routers/dashscope_upload.py，提供 POST /api/dashscope-upload/request-url 接口。
  服务器调用 DashScope Files API 为客户端申请 pre-signed upload URL，返回 {upload_url, file_id, expires_in_seconds}。
