notes_for_after: |
  实现参考：
  1. 在 dashscope_upload.py 中：
     - 使用已安装的 dashscope.Files 或 requests 调用 DashScope Files API
     - 申请一个 pre-signed upload URL（有效期至少 1 小时）
     - 返回 {upload_url, file_id, expires_in_seconds}
  2. 在 app/main.py 中：
     - include_router(dashscope_upload.router, prefix="/api/dashscope-upload")
  3. 路由命名约定：request_dashscope_upload_url
  4. 鉴权：使用 get_current_user 依赖
  5. 如果 DashScope SDK 不直接支持 build_upload_url，需用 requests 调用底层 API
result_summary: |
  新建 app/api/routers/dashscope_upload.py，提供 POST /api/dashscope-upload/request-url 接口。
  由于 DashScope SDK（v1.25.15）没有 build_upload_url() 方法，改为直接 requests 调用底层 REST API：
  GET https://dashscope.aliyuncs.com/api/v1/uploads?action=getPolicy&model=qwen-audio
  返回给前端 {upload_url, upload_host, upload_dir, oss_fields, file_id, expires_in_seconds}。
  file_id = upload_dir（OSS 对象路径），前端 PUT 成功后用此值作为 dashscope_file_id 提交。
  app/main.py 添加两行 import + include_router。
