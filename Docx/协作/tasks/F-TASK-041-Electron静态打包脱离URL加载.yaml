conflicts_with: []
notes_for_after: |
  1. 前端构建产物位置：frontend/dist/（Vite build 输出）
  2. 修改 desktop/scripts/build.mjs：
     - 新增步骤：构建前端 npm run build -> desktop/dist/
     - 将 desktop/dist/ 目录添加到 electron-builder 的 files 配置中
     - 添加 --standalone 模式（默认）和 --cloud-linked 模式（旧行为）
  3. 注册 app:// 协议（desktop/electron/app-protocol.mjs）：
     - 使用 app.setAsDefaultProtocolClient('app') 注册协议
     - 使用 protocol.registerFileProtocol('app', ...) 将 app:// 映射到 asar 内静态文件目录
     - URL 规则：app://local/index.html -> {app.getAppPath()}/dist/index.html
  4. 修改 desktop/electron/main.mjs 中 createMainWindow()：
     - 判断 isStandaloneMode = fs.existsSync(path.join(getDesktopClientRoot(), 'dist', 'index.html'))
     - 若是 standalone：loadURL('app://local/index.html'）
     - 若是 cloud-linked：loadURL(cloud.appBaseUrl)（现有逻辑）
  5. 配置文件新增字段 standaloneMode: boolean，由 build.mjs 写入 runtime-config.json
  6. 跨域注意：本地 HTML 通过 app:// 协议加载，API 请求发向云端 URL，需处理 CORS（通过 Electron main 进程的 net.fetch 代理请求）
result_summary: |
  实现 Electron 静态打包脱离 URL 加载：
  1. 新建 desktop/electron/app-protocol.mjs：app:// 协议处理模块，含协议客户端注册、文件协议映射、
     本地 URL 生成和 bundle 检测；
  2. 修改 desktop/scripts/build.mjs：新增 --standalone / --cloud-linked 构建模式，
     standalone 模式下自动构建前端并复制到 desktop/dist/；
  3. 修改 desktop/electron/main.mjs：注册 app:// 协议，根据 standaloneMode 选择本地/云端加载，
     通过 protocol.handle 代理跨域请求；
  4. 修改 desktop/scripts/write-runtime-defaults.mjs：写入 standaloneMode: true 默认值；
  5. 修改 desktop/electron/runtime-config.mjs：支持 standaloneMode 读取和环境变量覆盖；
  6. 修改 desktop/package.json：files 数组加入 dist/**/*。
