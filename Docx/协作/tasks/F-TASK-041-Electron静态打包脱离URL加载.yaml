project_root: D:/3.3-19.01
base_ref: main
goal: |
  将前端构建产物打包进 Electron asar，客户端改为加载 app://local/index.html（本地协议），实现无网络环境下应用仍能启动和运行核心功能。
scope:
  - Electron 打包脚本改造
  - 本地 app:// 协议注册
  - 前端静态构建集成
allowed_paths:
  - desktop/scripts/build.mjs
  - desktop/package.json
  - desktop/electron/main.mjs
  - desktop/electron/app-protocol.mjs
  - frontend/package.json
acceptance:
  - 无网络环境下运行客户端 exe，应用能正常启动并显示登录页（本地 UI）
  - 本地课程生成、练习、单词本等核心功能在无网时正常工作
  - 有网时所有联网功能（登录、余额、课程同步）继续正常工作
  - 打包后的安装包体积合理（前端产物增量应 <= 当前 asar 体积的 50%）
check_commands: []
depends_on: []
dependency_reason: ""
