title: Pydantic Schema系统化
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
goal: >
  在 app/schemas/ 下系统化 Pydantic Schema：
  按资源分为 auth.py、lesson.py、billing.py、admin.py、common.py。
  统一请求/响应分离：<Resource>Create、<Resource>Update、<Resource>Response。
  通用分页响应：PaginationMeta、PaginatedResponse（在 common.py 中实现）。
scope:
  - Pydantic Schema 重构
  - API 请求/响应规范化
allowed_paths:
  - app/schemas/
  - app/api/routers/
  - app/api/serializers.py
acceptance:
  - app/schemas/common.py 存在 PaginationMeta 和 PaginatedResponse
  - app/schemas/auth.py 存在 UserCreate、UserLogin、TokenResponse 等
  - app/schemas/lesson.py 存在 LessonCreate、LessonUpdate、LessonResponse 等
  - app/schemas/billing.py 存在 WalletResponse、RedeemCodeRequest 等
  - app/schemas/admin.py 存在 AdminUserResponse、AdminBillingRate 等
  - app/api/serializers.py 统一导出所有 Schema
  - 不改变任何 API 端点的路径、方法或行为，只重构数据类型
check_commands:
  - Get-ChildItem "D:/3.3-19.01/app/schemas/" -Name
  - python -c "from app.schemas import PaginationMeta, PaginatedResponse; print('PaginationMeta:', PaginationMeta); print('PaginatedResponse:', PaginatedResponse)"
