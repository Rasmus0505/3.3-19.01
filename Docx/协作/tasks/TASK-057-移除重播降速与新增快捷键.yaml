task_context: |
  沉浸式学习页的重播功能内置了逐次降速机制（第1次0.95x、第2次0.85x、第3次+0.75x），是历史遗留设计，
  用户反馈是"重播几次后自动降速"。本次完全移除该行为，重播始终从1.0x开始。
  同时新增 Shift+E 快捷键支持，用户可手动降倍速（循环档位：1.0x → 0.75x → 0.5x → 1.0x）。
goal: 重播句子时速度恒为1.0x；按Shift+E可在1.0x/0.75x/0.5x间循环切换，切换后立即生效。
