conflicts_with: []
notes_for_after: |
  1. 在 desktop/src/billing/offline-billing.mjs 中实现 BillingService 类：
     - checkBalance(): 联网 GET /api/wallet/balance，返回 {"balance": float, "currency": str}
     - canGenerate(estimatedSeconds): 根据视频时长估算费用，checkBalance() >= estimatedSeconds * rate 返回 true
     - reportUsage(courseId, actualSeconds): POST /api/wallet/consume，上报用量
  2. 费用估算：前端根据视频时长（probe_audio_duration_ms）估算 estimatedSeconds，乘以服务端配置的分钟费率（从 /api/billing/rates 获取）
  3. 前端 UploadPanel 改造：
     - 生成前先调用 canGenerate()，余额不足禁用按钮
     - 生成成功后调用 reportUsage()
     - 非客户端模式（云端生成）不受此限制，走服务端已有逻辑
  4. API 端点确认：检查 app/api/routers/billing/wallet.py 中 /api/wallet/balance 和 consume 端点的请求/响应格式。
  5. 先收口 frontend/src/features/upload/UploadPanel.jsx 中与课程导入导出逻辑重复声明的 helper/常量，恢复 npm --prefix frontend run build；
     本任务不需要回退 TASK-039 的功能，只需要在同一文件内消除重复定义并保留两边能力。
