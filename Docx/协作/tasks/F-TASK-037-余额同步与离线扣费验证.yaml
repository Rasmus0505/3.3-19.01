schema_version: 1
task_id: TASK-037
title: 余额同步与离线扣费验证
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  当前任务上一次已经把余额查询、幂等 consume 接口、本地 BillingService 和 UploadPanel 的桌面本地生成准入逻辑写进仓库，
  但未能完成验收，因为 frontend/src/features/upload/UploadPanel.jsx 同时混入了已完成 TASK-039 留下的重复声明，导致前端构建失败。

  这不是新的产品需求，而是同一主目标还没有真正交付完成：用户仍需要桌面本地 Bottle 1.0 在生成前正确校验余额、离线时阻止生成、
  成功后上报用量并刷新余额，同时恢复 UploadPanel 的可构建状态。

  本任务现在需要在现有允许路径内把 UploadPanel 的重复声明收口，并完成原有计费行为验收，使该能力能稳定交付。
goal: |
  在客户端实现余额检查和用量上报：生成前联网查余额并预判是否足够，生成后上报实际用量扣费；余额不足时禁用生成按钮；离线时阻止生成并提示联网。
scope:
  - 余额查询接口调用
  - 扣费用量上报
  - 前端生成按钮准入逻辑
allowed_paths:
  - desktop/src/billing/
  - frontend/src/features/upload/UploadPanel.jsx
  - app/api/routers/billing/wallet.py
acceptance:
  - 余额充足时"开始生成"按钮可用；余额不足时按钮禁用并显示"余额不足，请充值"
  - 生成成功后，客户端上报用量，服务端正确扣减余额
  - 离线时点击生成按钮，显示"离线模式下无法生成课程，请联网后重试"
  - 前端能正确显示当前余额（联网时）或"离线模式"（离线时）
check_commands:
  - python -m py_compile app/api/routers/billing/wallet.py
  - node --input-type=module -e "import('file:///D:/3.3-19.01/desktop/src/billing/offline-billing.mjs').then((mod)=>{console.log(Object.keys(mod).sort().join(','));}).catch((error)=>{console.error(error && error.stack ? error.stack : String(error)); process.exit(1);})"
  - npm --prefix frontend run build
depends_on:
  - TASK-036
dependency_reason: |
  余额操作需要用户已登录（JWT token），TASK-036 提供了离线认证缓存，本任务依赖其提供的 getCachedUser() 获取用户身份后才能调用余额接口。
