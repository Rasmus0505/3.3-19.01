schema_version: 1
task_id: TASK-031
title: 前端上传面板添加客户端诊断信息面板
status: done
priority: medium
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  用户在使用桌面客户端时遇到问题但不知道客户端当前状态。客户端内部运行着多个服务（本地 Helper、云端连接、客户端更新检测等），但用户看不到这些状态信息。

  用户明确表示："我希望现在我看到的客户端就是以后可以给用户发 exe 安装的客户端"，说明用户需要一个能展示客户端健康状态的诊断面板，让用户（以及自己测试时）能快速判断客户端是否正常运行。
goal: |
  在前端上传面板的设置或帮助入口处，添加一个可展开的诊断信息面板，显示客户端版本、云端连接状态、本地 Helper 状态、客户端更新状态、错误日志入口。
scope:
  - 前端上传面板 UI 改动
  - 客户端诊断信息获取逻辑
allowed_paths:
  - frontend/src/features/upload/UploadPanel.jsx
  - frontend/src/shared/api/client.js
  - desktop/electron/preload.mjs
acceptance:
  - 在上传面板的帮助或设置菜单中有一个"客户端诊断"入口
  - 点击展开后显示：客户端当前版本号
  - 显示云端服务连接状态（连接中/已连接/不可用）
  - 显示本地 Helper 状态（运行中/未启动/模型就绪）
  - 显示客户端更新状态（已是最新/发现新版本/检查更新失败）
  - 有一个"打开日志目录"按钮，点击后调用 window.desktopRuntime.openLogsDirectory()
  - 非 Electron 环境（纯浏览器）下不显示诊断面板
check_commands:
  - ""
