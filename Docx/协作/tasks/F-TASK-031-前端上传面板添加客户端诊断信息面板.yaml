conflicts_with: []
notes_for_after: |
  1. 在 UploadPanel.jsx 中添加一个 useState 用于存储诊断信息。
  2. 在 useEffect 中调用 window.desktopRuntime.getRuntimeInfo() 获取完整诊断数据。
  3. 添加一个诊断面板组件（可以是一个 Dialog 或折叠面板），在帮助图标处触发。
  4. 诊断面板需要显示 runtimeInfo.clientUpdate、runtimeInfo.helperStatus、runtimeInfo.serverStatus、runtimeInfo.cloud 等字段。
  5. 调用 window.desktopRuntime.openLogsDirectory() 时需要通过 ipcMain.handle 在 desktop/electron/main.mjs 中注册。
  6. 注意样式要与现有 UI 风格保持一致。
