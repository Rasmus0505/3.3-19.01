title: 本地 faster-whisper HTTP 服务封装
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  当前 Python Helper 子进程（scripts/run_desktop_backend.py）通过 spawn 调用 faster-whisper，前端通过 Electron main 进程的 IPC 函数直接调用子进程函数。这种方式的缺点是：前端和推理逻辑耦合，协议不标准，扩展困难（如增加健康检查接口、超时控制）。

  解决方向：参考 Memo 的 Addon 模式，将 Python Helper 改造为独立的 HTTP 服务器，暴露标准化 REST 接口，前端通过 fetch 直接调用，解耦前端与推理逻辑。
goal: |
  将 scripts/run_desktop_backend.py 改造为 FastAPI HTTP 服务器（监听本地固定端口），暴露 /api/local-asr/transcribe、/api/local-asr/generate-lesson、/health 等接口；在 Electron preload 中通过 window.localAsr 暴露这些接口给前端。
scope:
  - Python Helper HTTP 服务改造
  - 本地 ASR 接口设计与实现
  - Electron preload 接口扩展
allowed_paths:
  - scripts/run_desktop_backend.py
  - app/infra/asr/faster_whisper.py
  - desktop/electron/preload.mjs
  - desktop/electron/main.mjs
acceptance: |
  - Python Helper 启动后监听本地端口（如 18765），/health 返回 {"ok": true, "model_ready": true}
  - POST /api/local-asr/transcribe 对本地视频文件返回 {"text": "...", "words": [{"word": "Hello", "start": 0.0, "end": 0.5}]}
  - POST /api/local-asr/generate-lesson 返回完整课程 JSON（含 sentences）
  - 前端 window.localAsr.transcribe({filePath: '...'}) 返回正确的 ASR 结果
  - Helper 进程崩溃后前端收到有意义的错误信息（不是静默失败）
