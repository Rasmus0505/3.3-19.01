notes_for_after: |
  1. 端口分配：在 DESKTOP_RUNTIME_CONFIG_FILE_NAME (runtime-config.json) 中新增 localAsrPort 字段，首次启动时 pickFreePort 写入配置文件，后续直接读取。
  2. scripts/run_desktop_backend.py 改造为 FastAPI 应用：
     - 保留现有的 faster-whisper 推理逻辑（from app.infra.asr.faster_whisper import）
     - 移除 subprocess/spawn 调用，改为直接函数调用
     - 新增 FastAPI app，监听 127.0.0.1:localAsrPort
     - 接口：
       GET  /health                     -> {"ok": bool, "model_ready": bool, "python_version": str}
       POST /api/local-asr/transcribe    -> {"text": str, "words": [...], "usage_seconds": int}
       POST /api/local-asr/generate-lesson -> {"course_id": str, "sentences": [...], "preview_text": str}
  3. desktop/electron/main.mjs 中 startBackend() 在启动 Helper 后从配置文件读取 localAsrPort。
  4. desktop/electron/preload.mjs 中新增 window.localAsr：
     - health(): GET /health
     - transcribe({filePath}): POST /api/local-asr/transcribe
     - generateLesson({filePath}): POST /api/local-asr/generate-lesson
  5. 配置写入：在 desktop/electron/runtime-config.mjs 的 validateDesktopRuntimeConfig 中校验 localAsrPort 存在。
result_summary: "已为桌面 Helper 新增 /api/local-asr/transcribe 与 /api/local-asr/generate-lesson 接口，preload 暴露 window.localAsr，并将本地 ASR 端口固定为 18765（支持 DESKTOP_LOCAL_ASR_PORT 覆盖）。"
