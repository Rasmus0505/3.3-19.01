notes_for_after: |
  1. 本任务真正生效的前端入口不是 frontend/src/features/auth/AuthPanel.jsx（它只是 re-export），而是 frontend/src/features/auth/components/AuthPanel.jsx；认证状态持久化与过期处理集中在 frontend/src/store/slices/authSlice.ts。
  2. 在 desktop/src/db/schema.sql 与对应本地数据库桥接中补 auth_cache 表，至少包含 user_id、email、access_token、refresh_token、安全存储结果、expires_at、cached_at 等恢复登录所需字段。
  3. 在 desktop/src/auth/offline-auth.mjs 中实现可复用的 AuthCache/AuthService：
     - login(email, password): 联网调用 /api/auth/login，成功后缓存 token 与用户信息
     - getCachedUser(): 启动时读取 SQLite 缓存并判断是否可恢复
     - refreshTokenIfNeeded(): access_token 过期但联网时静默刷新
     - logout(): 同步清除 auth_cache 与 frontend/src/app/authStorage.js 中的 token
     - isLoggedIn(): 返回当前缓存是否仍可用
  4. refresh_token 不要以明文长期落盘；优先通过 Electron safeStorage 做加密。若当前 preload 无法直接安全调用，就通过 desktop/electron/main.mjs 增加最小 IPC 桥接，不要把敏感 token 明文暴露给 renderer。
  5. 前端接线要覆盖真实使用入口：
     - frontend/src/features/auth/components/AuthPanel.jsx
     - frontend/src/store/slices/authSlice.ts
     - frontend/src/app/LearningShellLocalSubtitles.jsx
     - frontend/src/app/AdminShellStandalone.jsx
     - frontend/src/app/authStorage.js
     启动时优先尝试恢复缓存身份；恢复失败且离线时提示联网登录；主动退出时统一清空所有缓存。
  6. app/api/routers/auth/router.py 已有 /login、/refresh、/logout，优先复用现有契约；只有在字段不足以支持恢复流程时才最小调整接口返回。
result_summary: "新增桌面端 auth_cache 持久化与 refresh_token 安全存储桥接，前端认证入口可恢复离线登录、联网刷新并在过期时统一进入 expired 状态。"
