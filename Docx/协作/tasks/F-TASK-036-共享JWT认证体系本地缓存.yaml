  - "@'\nconst { createLocalDbBridge } = require('./desktop/src/db/local-db.cjs');\nlet snapshot = null;\nconst storage = {\n  loadBytes: async () => (snapshot ? new Uint8Array(snapshot) : null),\n  saveBytes: async (bytes) => {\n    snapshot = new Uint8Array(bytes);\n  },\n};\n(async () => {\n  const bridge = createLocalDbBridge({ storage });\n  await bridge.saveAuthCache({\n    cache_key: 'default',\n    user_id: '1',\n    email: 'user@example.com',\n    is_admin: true,\n    access_token: 'header.payload.signature',\n    access_token_expires_at: '2026-03-24T12:00:00Z',\n    refresh_token_ciphertext: 'cipher',\n    refresh_token_storage_mode: 'plaintext-base64',\n    refresh_token_expires_at: '2026-03-25T12:00:00Z',\n    cached_at: '2026-03-24T11:00:00Z',\n    updated_at: '2026-03-24T11:00:00Z',\n  });\n  const cached = await bridge.getAuthCache('default');\n  if (!cached || cached.user_id !== '1' || cached.email !== 'user@example.com') {\n    throw new Error('auth cache roundtrip failed');\n  }\n  await bridge.clearAuthCache('default');\n  const cleared = await bridge.getAuthCache('default');\n  if (cleared !== null) {\n    throw new Error('auth cache clear failed');\n  }\n  console.log('auth cache smoke test passed');\n})().catch((error) => {\n  console.error(error);\n  process.exit(1);\n});\n'@ | node"
