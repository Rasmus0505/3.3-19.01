schema_version: 1
task_id: TASK-036
title: 共享JWT认证体系本地缓存
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  当前桌面端已经具备本地 SQLite 基础层（TASK-033 已完成），但登录态仍只靠前端 localStorage 临时保存 access_token / refresh_token。用户一旦断网重启客户端，就无法沿用已登录身份继续使用，后续余额校验和同步任务也会因为没有稳定身份缓存而无法落地。

  上一次执行把任务卡在 blocked，不是因为需求本身不可做，而是因为 allowed_paths 没覆盖真实生效的认证入口和状态流文件。这个任务现在需要补齐真实边界，让 after 能在同一个任务里完成本地认证缓存、刷新、过期退出和前端恢复流程。
goal: |
  实现本地 JWT 认证缓存：联网登录成功后自动缓存 access_token 和 refresh_token；离线时从 SQLite 读取缓存用户信息，维持登录状态。
scope:
  - 本地认证缓存表设计与安全存储
  - 桌面端 preload 认证桥接
  - 前端真实认证状态入口与恢复流程
  - 服务端登录刷新接口对接
allowed_paths:
  - desktop/src/auth/
  - desktop/src/db/
  - desktop/electron/preload.mjs
  - desktop/electron/main.mjs
  - frontend/src/features/auth/components/AuthPanel.jsx
  - frontend/src/store/slices/authSlice.ts
  - frontend/src/app/authStorage.js
  - frontend/src/app/LearningShellLocalSubtitles.jsx
  - frontend/src/app/AdminShellStandalone.jsx
  - app/api/routers/auth/router.py
acceptance:
  - 联网登录成功后，断开网络重新打开桌面客户端，LearningShellLocalSubtitles 入口能以缓存账户身份恢复登录并进入首页
  - access_token 过期但 refresh_token 仍有效且当前联网时，客户端能自动调用刷新接口并继续保持登录状态
  - refresh_token 也过期且当前无网时，真实认证入口显示"登录状态已过期，请联网重新登录"，authSlice 状态为 expired
  - logout() 会同时清除 localStorage 与本地 auth_cache，下次打开客户端不能再自动恢复登录
  - AdminShellStandalone 与 LearningShellLocalSubtitles 复用同一套认证缓存与退出逻辑，不出现状态分叉
check_commands:
  - node --check desktop/electron/preload.mjs
  - node --input-type=module -e "import('./desktop/src/auth/offline-auth.mjs').then((mod) => console.log(Object.keys(mod).sort().join(',')))"
  - npm --prefix frontend run build
depends_on:
  - TASK-033
dependency_reason: |
  本任务依赖 TASK-033 的 SQLite 数据库层，auth_cache 表和数据库初始化逻辑需要在其基础上实现。
