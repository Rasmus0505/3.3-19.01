notes_for_after: |
  1. 修改 desktop/electron/main.mjs 中 selectLocalMediaFile() 函数的返回值，在 dialog canceled 或 inspectDesktopMediaFile 抛出异常时，返回详细的 error 字段。
  2. 修改 frontend/src/features/upload/UploadPanel.jsx 中 selectDesktopLocalSourceFile() 函数，当 selection.error 存在时通过 toast.error() 显示。
  3. 同样处理 cloudServerStatus 的错误信息传递，在 UploadPanel 中使用 getServerStatus() 返回的 reason 字段。
  4. 注意保持向后兼容，不要破坏现有的正常文件选择流程。
result_summary: 已补全桌面端文件选择错误返回链路，并让上传面板优先展示真实文件选择错误与云端连接失败原因。
