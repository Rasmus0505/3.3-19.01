schema_version: 1
task_id: TASK-061
title: 热更新公告系统
status: pending
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  产品新增热更新公告功能，支持管理后台推送更新公告，用户端检测到新公告后弹窗提示刷新。
  业务规则（已与产品经理确认）：
  - 管理后台：「发布公告」页面，支持标题 + 内容 + 发布时间（支持立即发布或定时发布）
  - 版本比较：管理后台改版本号即推更新弹窗
  - 用户端：定期轮询检测新公告，弹窗提示是否立即刷新
  - 刷新机制：window.location.reload() 即可完成更新（Electron 桌面端复用服务器最新代码）
goal: 管理后台可发布公告，用户端收到更新提示并可刷新页面
scope:
  - 后端数据模型（新建 app/models/announcement.py）：
    * Announcement 表：id、title、content、version、published_at、is_active、created_at、updated_at
    * AppVersion 表（可选，直接用 config 或单行记录）：存储当前 active 版本号
  - 后端API（新建 app/api/routers/announcements.py）：
    * GET /api/announcements/latest — 获取最新有效公告（version+is_active）
    * GET /api/announcements/ — 公告列表（所有人可见）
    * POST /api/admin/announcements — 管理员创建公告
    * GET /api/admin/announcements — 管理员查看所有公告
    * PATCH /api/admin/announcements/:id — 编辑公告
    * DELETE /api/admin/announcements/:id — 删除公告
    * PATCH /api/admin/app-version — 更新当前版本号
  - 后端服务（新建 app/services/announcement_service.py）
  - 前端管理后台（新建 frontend/src/features/admin-pages/AdminAnnouncementsPage.tsx）：
    * 公告列表视图
    * 发布表单（标题、内容、版本号、发布时间）
    * 版本号更新入口
  - 前端用户端（修改 frontend/src/app/LearningShell.jsx 或 App.tsx）：
    * useEffect 中每 5 分钟轮询 GET /api/announcements/latest
    * 检测到新公告时弹出 UpdateAnnouncementDialog
  - 前端弹窗组件（新建 frontend/src/features/update/UpdateAnnouncementDialog.tsx）：
    * 显示公告标题和内容
    * 「立即刷新」按钮 → window.location.reload()
    * 「稍后再说」按钮 → 关闭弹窗，下次进入再检测
    * 弹窗关闭后记录已读状态（localStorage），避免重复弹出
allowed_paths:
  - app/models/announcement.py（新建）
  - app/api/routers/announcements.py（新建）
  - app/services/announcement_service.py（新建）
  - app/api/__init__.py（注册路由）
  - frontend/src/features/admin-pages/AdminAnnouncementsPage.tsx（新建）
  - frontend/src/features/update/UpdateAnnouncementDialog.tsx（新建）
  - frontend/src/app/LearningShell.jsx
  - frontend/src/app/App.tsx
acceptance:
  - 管理后台可创建/编辑/删除公告，可设置发布时间
  - 管理后台可更新当前版本号
  - 用户端定期检测新公告，弹窗显示公告内容
  - 点击「立即刷新」后页面重新加载，加载最新代码
  - 公告仅在 is_active=true 时推送，发布时间<=now 时才视为有效
check_commands:
  - cd D:/3.3-19.01 && pytest -q
  - cd D:/3.3-19.01/frontend && npm run dev
