conflicts_with: []
notes_for_after: |
  1. 本次需要执行数据库迁移（新建 Announcement 表）
  2. 轮询策略：页面加载时立即检测，之后每 5 分钟检测一次；切换页面时不清除已读状态
  3. 已读状态用 localStorage 存 announcementId 列表，避免同一公告重复弹窗
  4. 公告内容支持纯文本或 Markdown（管理后台用 textarea，前端用 react-markdown 渲染）
  5. 版本号比较：公告的 version 与前端 hardcoded 的 CURRENT_VERSION 常量比较，version 更大则弹窗
  6. 前端 CURRENT_VERSION 存于 frontend/src/shared/lib/version.js
  7. Electron 桌面端更新机制：electron 主进程加载 URL 指向服务器，刷新即加载最新，无需额外 electron-updater
  8. 需要运行 PostgreSQL 迁移：alembic revision --autogenerate + alembic upgrade head
