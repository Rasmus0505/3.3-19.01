notes_for_after: |
  错误类型与 HTTP 状态码映射：
  - AuthError: 401 Unauthorized
  - LessonError: 400 Bad Request（课程相关业务错误）
  - BillingError: 402 Payment Required（余额不足等）
  - NotFoundError: 404 Not Found
  - ValidationError: 422 Unprocessable Entity

  现有直接 raise HTTPException 改为 raise 对应业务异常，
  在路由层统一捕获并转换为 error_response。
result_summary: |
  统一错误处理体系建立完成：
