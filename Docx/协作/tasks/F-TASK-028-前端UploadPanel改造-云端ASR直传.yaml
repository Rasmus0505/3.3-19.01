notes_for_after: |
  UploadPanel.jsx 中 handleCloudGeneration() 需要改造：
  1. 判断是否云端 ASR（asr_model 不是 faster-whisper）
  2. 如果是云端 ASR：
     a. POST /api/dashscope-upload/request-url，body={filename, content_type}
     b. 拿到 {upload_url, file_id} 后
     c. fetch(upload_url, {method:'PUT', body:file, headers:{'Content-Type':content_type}})
     d. PUT 完成后，formData.append('dashscope_file_id', file_id)
     e. POST /api/lessons/tasks 时带上 dashscope_file_id
  3. 如果是本地 ASR（faster-whisper）：
     - 保持现有 handleLocalGeneration() 逻辑不变
  4. 错误处理：
     - 如果 request-url 接口失败，回退到现有上传逻辑（作为降级方案）
     - 如果 PUT 到 DashScope 失败，提示用户并可重试
  5. 进度提示：PUT 阶段复用现有 onUploadProgress callback
  6. 鉴权：uploadUrl 请求需要携带 access_token（从 authStorage 读取）
  7. asrStrategy.js 可能需要调整（如果涉及云端 ASR 的模型选择逻辑）
result_summary: |
  前端 UploadPanel.jsx：新增 submitCloudDirectUpload() 函数，实现云端 ASR 直传三步流程：
  1. POST /api/dashscope-upload/request-url 获取 OSS policy 认证字段
  2. fetch PUT 直接上传到 DashScope OSS（含 OSS 凭证 + 文件内容）
  3. POST /api/lessons/tasks 时携带 dashscope_file_id
  同时修改 app/api/routers/lessons.py：video_file 改为可选，lesson_command_service.py：支持 dashscope_file_id 存在时跳过文件处理。
  npm run build --prefix frontend 构建成功（无新增错误）。
  本地 ASR（faster-whisper）流程完全不受影响。
