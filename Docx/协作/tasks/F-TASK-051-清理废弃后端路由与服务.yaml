task_context: |
  当前后端存在多条互不相干的生成素材流程：普通云端上传、旧版云端直传 pre-signed URL、服务器端 faster-whisper 推理、浏览器端本地 ASR（本地资产 API）、URL 导入。
  这些流程全部要被删除，只保留 Bottle 2.0 云端识别（Bottle 2.0 通过 STS 凭证架构实现，客户端直连阿里云，服务器仅处理文字）。
  需要删除所有相关后端代码，否则遗留代码会持续产生维护负担。
goal: 删除所有与被删流程相关的后端代码，服务器仅保留 Bottle 2.0 STS 架构和分句/翻译/存课/计费能力。
scope:
  - app/api/routers/desktop_asr.py — 全部删除
  - app/api/routers/local_asr_assets.py — 全部删除
  - app/api/routers/dashscope_upload.py — 全部删除
  - app/api/routers/lessons.py — 删除 legacy /api/lessons POST 和旧版 cloud 分支，保留 STS 兼容的 /api/lessons/tasks
  - app/api/routers/lessons/router.py — 删除 browser_local 相关路由
  - app/services/asr_dashscope.py — 保留，仅用于 Bottle 2.0
  - app/infra/asr/dashscope.py — 保留
  - app/infra/asr/faster_whisper.py — 删除
  - app/services/faster_whisper_asr.py — 删除
  - app/services/media_url_import.py — 删除
  - app/services/asr_model_registry.py — 删除 faster-whisper 配置，保留 dashscope 模型配置
  - app/main.py — 删除相关路由注册
allowed_paths:
