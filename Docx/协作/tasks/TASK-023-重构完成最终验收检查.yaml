notes_for_after: |
  本任务是最终验收检查，由规划者执行。
  验收检查分为以下维度：

  1. 后端完整性：
     - FastAPI 能否正常启动（python -c "from app.main import app"）
     - 所有路由是否正确注册（检查 main.py include_router）
     - Repository 层、Infra 层、Schema 层是否完整

  2. 前端完整性：
     - npm run build 是否成功
     - Store 拆分后前端是否正常工作
     - TypeScript 类型是否完整

  3. 测试完整性：
     - pytest --collect-only 能否收集所有测试
     - fixtures 是否正确建立

  4. 文档完整性：
     - docs/ 目录是否包含所有必需文档
     - CHANGELOG.md 是否正确格式
     - .env.example 是否完整

  5. 任务池完整性：
     - 所有已完成任务（done）都有 F-TASK-xxx 文件名
     - 所有未完成任务（todo）都有 TASK-xxx 文件名
     - 无孤立的 I-TASK-xxx、B-TASK-xxx、fix-TASK-xxx 文件（除非是正常 in_progress/fixing）

  6. 代码质量：
     - 无死代码、未完成的 import（grep 检查）
     - 无硬编码的敏感信息
     - Dockerfile 构建成功

  如果发现问题，记录到 result_summary 并用 fix-TASK-xxx 格式新建修复任务。
