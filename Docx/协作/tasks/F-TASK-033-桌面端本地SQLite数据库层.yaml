title: 桌面端本地 SQLite 数据库层
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
task_context: |
  Bottle 要从"网页包装器"升级为可完全离线运行的独立桌面应用。当前的 Electron 客户端没有本地数据库，所有数据（课程、进度、单词本）都依赖云端 PostgreSQL。离线场景下用户无法练习、管理单词本，甚至看不到课程列表。

  解决方向：引入 sql.js（WebAssembly SQLite）在 Electron renderer 进程中运行本地数据库，设计表结构（courses、progress、wordbook），为后续的离线同步打好基础设施。
goal: |
  在 desktop 子项目中引入 sql.js，设计本地 SQLite 表结构（courses、progress、wordbook、sync_meta），实现基础的 CRUD 操作，并通过 preload 暴露 window.localDb 接口供前端调用。
scope:
  - 桌面客户端本地数据库选型与初始化
  - 本地 SQLite 表结构设计与建表 SQL
  - 数据库迁移机制
  - CRUD 接口设计与实现
allowed_paths:
  - desktop/src/db/
  - desktop/electron/preload.mjs
  - desktop/package.json
acceptance:
  - Electron 启动后，renderer console 能执行 window.localDb.getCourses() 并返回空数组 []
  - 执行 window.localDb.saveCourse({...}) 后，getCourses() 能返回刚保存的课程
  - 重启客户端后本地数据不丢失（持久化到 IndexedDB）
  - 数据库操作出错时返回有意义的错误信息而不是崩溃
