    node -e "const { createLocalDbBridge } = require('./src/db/local-db.cjs'); const bridge = createLocalDbBridge({ storage: { loadBytes: async () => null, saveBytes: async () => {} }, loadSqlJs: () => async () => ({ Database: function Database() {} }), resolveWasmUrl: () => 'file:///tmp/sql-wasm.wasm' }); console.log(Object.keys(bridge).sort().join(','));"
  - |-
    node -e "const { createLocalDbBridge } = require('./src/db/local-db.cjs'); let snapshot = null; const storage = { loadBytes: async () => (snapshot ? new Uint8Array(snapshot) : null), saveBytes: async (bytes) => { snapshot = new Uint8Array(bytes); } }; (async () => { const bridge1 = createLocalDbBridge({ storage }); const initial = await bridge1.getCourses(); if (!Array.isArray(initial) || initial.length !== 0) throw new Error('initial not empty'); await bridge1.saveCourse({ id: 'course-1', title: 'Local Course', metadata: { source: 'test' } }); const afterSave = await bridge1.getCourses(); if (afterSave.length !== 1 || afterSave[0].id !== 'course-1') throw new Error('save failed'); const bridge2 = createLocalDbBridge({ storage }); const afterReload = await bridge2.getCourses(); if (afterReload.length !== 1 || afterReload[0].title !== 'Local Course') throw new Error('reload failed'); let sawError = false; try { await bridge2.saveCourse({ id: '', title: '' }); } catch (error) { sawError = /course\\.id is required|course\\.title is required/.test(String(error.message || '')); } if (!sawError) throw new Error('validation failed'); console.log('local-db smoke test passed'); })().catch((error) => { console.error(error); process.exit(1); });"
