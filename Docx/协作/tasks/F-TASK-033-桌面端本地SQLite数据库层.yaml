notes_for_after: |
  1. 选型：使用 sql.js（https://sql.js.org/），它将 SQLite 编译为 WebAssembly，可在浏览器和 Electron renderer 进程中直接运行，无需原生模块。
  2. 数据库文件存储在 Electron 的 IndexedDB 中（通过 sql.js 的 IDBBDatabaseAdapter），避免直接操作文件系统。
  3. 表结构设计（参考现有 PostgreSQL schema）：
     - courses: id, title, source_filename, duration_ms, runtime_kind, asr_model, created_at, updated_at, synced_at, version, is_local_only
     - lesson_sentences: id, course_id, sentence_index, english_text, chinese_text, start_ms, end_ms, words_json, variant_key, created_at, updated_at
     - progress: id, course_id, user_id, current_index, completed_indices_json, started_at, updated_at, synced_at
     - wordbook_entries: id, word, course_id, sentence_id, created_at, synced_at
  4. 在 desktop/electron/preload.mjs 中通过 contextBridge 暴露 window.localDb，方法包括：
     - init(): 初始化数据库，建表（如不存在）
     - getCourses(), saveCourse(course), deleteCourse(id)
     - getSentences(courseId), saveSentences(courseId, sentences)
     - getProgress(courseId), saveProgress(courseId, progress)
     - getWordbook(), saveWordbookEntry(entry), deleteWordbookEntry(id)
  5. 需要处理 async 初始化：sql.js 加载 WASM 文件需要时间，前端调用前需确保 init() 已完成。
result_summary: |
  已在 desktop 侧落地基于 sql.js 的本地 SQLite 数据库层，新增课程/句子/进度/单词本/同步元数据表与 CRUD，preload 暴露 window.localDb，并完成基于真实 sql.js 的保存、读取与重建持久化烟测。
