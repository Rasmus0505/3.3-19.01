goal: >
  修改 app/api/routers/lessons.py 的 create_lesson_task 接口，
  支持接收可选字段 dashscope_file_id。
  当该字段存在时，任务创建逻辑走 dashscope_file_id 直传分支；
  当该字段不存在时，沿用现有文件上传逻辑（向后兼容）。
scope:
  - lessons 路由改造
  - 课程任务创建入口
  - 直传/上传双路径分支
allowed_paths:
  - app/api/routers/lessons.py
  - app/services/lesson_command_service.py
  - app/services/lesson_task_manager.py
acceptance:
  - "create_lesson_task 接口接受可选的 dashscope_file_id 字段"
  - "当 dashscope_file_id 存在时，LessonGenerationTask.artifacts_json 中记录 dashscope_file_id"
  - "run_lesson_generation_task 识别到 dashscope_file_id 时走直传分支（不创建 source_path）"
  - "当 dashscope_file_id 不存在时，现有文件上传逻辑完全不变"
  - "python -c 'from app.api.routers.lessons import router; print(\"lessons router imports OK\")'"
