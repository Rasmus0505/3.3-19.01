  - 侧边栏顶部显示状态徽章：在线（绿色）、离线（灰色），hover 显示详细说明
  - 断开网络后客户端不崩溃，各页面功能降级友好
  - 联网瞬间弹出 Toast"已恢复连接，正在同步..."，同步完成后提示"同步完成，共同步 X 条"
  - 余额显示：联网时显示精确余额，离线时显示"离线模式，余额待同步"
  - 课程列表：区分本地课程（橙色徽章）和已同步课程（绿色徽章）
