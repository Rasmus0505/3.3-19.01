task_context: |
  两个生词本相关问题：
  (a) Bug：最后一句无法加入生词本 — 因为「加入生词本」按钮用的是 previousSentence（上一句），最后一句时 previousSentence 指向倒数第二句，导致最后一句加不了
  (b) 新功能：生词本列表中每个生词/短语可回溯查看原视频句子，弹窗播放后暂停
goal: 修复最后一句无法加入生词本的bug；新增回溯视频弹窗功能。
scope:
  - Bug修复：frontend/src/features/immersive/ImmersiveLessonPage.jsx
    * 「加入生词本」按钮逻辑（第3098-3108行）
    * 当前按钮使用 previousSentence，最后一句时无法加入
    * 修复：同时支持 currentSentence，当 currentSentence 存在时优先用 currentSentence
    * 修复后：任意句子均可加入生词本，包括最后一句
  - 新功能（新建文件）：
    * frontend/src/features/wordbook/WordbookVideoPopup.tsx
      - 固定 560px 宽居中弹窗，使用项目已有 Dialog/Modal 组件
      - 内含简化视频播放器（复用 ImmersiveLessonPage 视频播放逻辑）
      - 播完自动暂停，显示重播按钮，重播快捷键 Shift+R 适用
      - 可关闭，关闭后不跳转页面
    * frontend/src/app/wordbook/WordbookPage.tsx（或对应文件）
      - 在生词本列表每个条目旁新增「查看视频」按钮
      - 点击按钮打开 WordbookVideoPopup，传入句子信息（lessonId、sentenceIndex、mediaUrl）
allowed_paths:
  - frontend/src/features/immersive/
  - frontend/src/features/wordbook/
  - frontend/src/app/wordbook/
acceptance:
  - 在任意句子（包括最后一句）点击「加入生词本」，API 调用成功
  - 生词本列表每个条目旁有「查看视频」按钮，点击弹出 560px 宽弹窗
  - 弹窗内视频自动播放，播完后暂停，显示重播按钮
  - Shift+R 在弹窗内可重播视频
