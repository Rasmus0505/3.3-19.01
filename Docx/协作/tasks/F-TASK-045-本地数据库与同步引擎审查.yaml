schema_version: 1
task_id: TASK-045
title: 本地数据库与同步引擎审查
status: done
priority: high
goal: 审查 desktop/src/db/ 和 desktop/src/sync/ 的数据完整性、事务安全与同步冲突处理，输出结构化问题清单
scope: desktop/src/db/local-db.cjs、desktop/src/db/schema.sql、desktop/src/db/sync-journal.mjs、desktop/src/sync/sync-engine.mjs
acceptance:
  - 检查 sql.js + IndexedDB 持久化机制的数据一致性保障（写放大、快照损坏、WASM 初始化失败场景）
  - 评估 sync_journals 和 sync_conflicts 表在并发写入时的行为正确性
  - 审查 sync-engine.mjs 中的冲突检测算法与三种解决策略（local/remote/merge）的边界条件
  - 识别本地数据库与云端数据不一致的潜在触发路径
  - 每项问题附带严重等级（critical/high/medium/low）和修复方向提示
depends_on: []
conflicts_with: []
notes_for_after: |
  使用 Ask Mode（只读模式）进行全面审查，不要修改任何文件。
  审查范围包括 desktop/src/db/ 和 desktop/src/sync/ 下所有文件。
  输出格式：问题编号 | 严重等级 | 问题类别 | 位置/行号 | 描述 | 修复方向。
result_summary: 只读审查完成，识别出 6 项数据库与同步风险，其中 2 项 critical、3 项 high、1 项 medium。
review_findings: |
  01 | critical | 进度同步主键错配 | desktop/src/sync/sync-engine.mjs:457-470; desktop/src/db/local-db.cjs:796-808 | progress journal 的 record_id 实际是 progress.id（courseId:userId），但 syncProgress 调用 getProgress 时把它当作 course_id 查询，导致待同步进度大概率永远取不到，云端进度不会更新。 | 增加 getProgressById，或先从 journal.record_id 解析出 course_id/user_id 后查询；同步成功后立即 markSynced。
  02 | critical | 删除后数据复活 | desktop/src/db/local-db.cjs:728-735; desktop/src/sync/sync-engine.mjs:279-338; desktop/src/sync/sync-engine.mjs:349-357 | 本地删除课程时没有写 DELETE journal，也没有 tombstone。下一次拉远端课程时，这条记录会被当作“远端存在、本地不存在”的课程重新写回本地，形成删不掉和反复复活。 | deleteCourse 需要和 DELETE journal/tombstone 在同一事务落库，并在成功同步删除后清理映射。
  03 | high | journal 队列无法收敛 | desktop/src/db/schema.sql:1-17; desktop/src/db/sync-journal.mjs:149-187; desktop/src/db/sync-journal.mjs:287-328; desktop/src/sync/sync-engine.mjs:344-405; desktop/src/sync/sync-engine.mjs:457-474 | sync_journals 只有随机主键，没有按 table_name + record_id + status/version 去重；而 syncCourses/syncProgress 成功上云后都没有调用 markSynced，pending 记录会长期堆积并被重复回放。 | 为 journal 建立幂等键或“每记录仅保留最新 pending”机制，并在每次远端确认成功后 markSynced。
  04 | high | sql.js 与 IndexedDB 持久化非原子 | desktop/src/db/local-db.cjs:484-493; desktop/src/db/local-db.cjs:535-540; desktop/src/db/local-db.cjs:677-724; desktop/src/db/local-db.cjs:834-874; desktop/src/db/local-db.cjs:1016-1034 | 代码先修改内存中的 sql.js 数据库，再把整库 export 到 IndexedDB 单 key。只要 COMMIT 后 saveBytes 失败、配额不足或进程崩溃，内存状态与持久化快照就会分叉，重启后本地数据和同步日志一起回退；同时每次小写入都全量写快照，写放大明显。 | 引入 dirty flag、版本号与 compare-and-swap，至少做双快照/校验；更稳妥的方案是 WAL/增量日志，而不是每次整库覆盖。
  05 | high | 坏快照 / WASM 失败无恢复路径 | desktop/src/db/local-db.cjs:497-512; desktop/src/db/local-db.cjs:601-624 | sql.js WASM 解析失败、IndexedDB 读出损坏快照或 new sqlJs.Database(persisted) 抛错时，初始化直接失败并把 database 置空，没有备份回滚、坏快照隔离或只读降级。单个坏 blob 就可能让桌面端本地能力整体不可用。 | 保存最近 N 代快照和校验值，区分 WASM 缺失、快照损坏、IDB 读取失败，并提供自动重建或只读恢复路径。
  06 | medium | 冲突检测与解决策略只覆盖 courses | desktop/src/sync/sync-engine.mjs:289-302; desktop/src/sync/sync-engine.mjs:574-623; desktop/src/db/sync-journal.mjs:189-279 | 当前冲突检测只处理 courses 的“远端更新时间更晚且本地未同步”场景；progress/wordbook 没有远端拉取对比，local/remote/merge 三种策略也只对 courses 生效。接口已经暴露通用 resolveConflict，但其它表实际没有闭环。 | 为每个同步表定义明确的冲突检测器和策略执行器；未实现的表不要暴露通用冲突解决能力。
