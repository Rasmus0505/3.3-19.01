  2. 新建 desktop/src/services/local-course-generator.mjs 提供 LocalCourseGenerator 类，
     封装后端调用、本地 SQLite 存储、进度回调；
  3. desktop/electron/preload.mjs 暴露 window.localAsr.generateCourse 接口；
  4. frontend/src/features/upload/UploadPanel.jsx 新增「本地生成」按钮、
     submitDesktopLocalGenerateCourse 函数、完整进度状态（转写→保存→完成），
     生成后自动保存到 localDb、分发事件刷新列表、上报扣费。
