acceptance:
  - 选择本地视频文件后点击"本地生成"，完整课程出现在课程列表中
  - 课程包含正确的英文原文、中文翻译和时间戳
  - 生成后余额正确扣减
  - 生成过程中显示各阶段进度（转写 X%、翻译 X%、完成）
  - 若翻译模块不可用（离线且无本地翻译模型），优雅降级：课程仍可生成但不含翻译字段，提示用户"翻译将在联网后自动补全"
