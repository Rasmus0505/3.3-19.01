notes_for_after: |
  1. 在 scripts/run_desktop_backend.py 中新增 /api/local-asr/generate-course 端点：
     POST /api/local-asr/generate-course
     Body: { filePath: str, sourceFilename: str }
     流程：转写 → 句子切分 → 翻译（优先本地，无则云端）→ 生成 course_id 组装 JSON
     返回后：
       前端调用 window.localDb.saveCourse({...}) 存入本地 SQLite
       调用 window.syncEngine.syncCourses() 写入 sync_journals
       调用 TASK-037 的 reportUsage() 上报扣费
  2. 翻译处理策略：
     - 有网时：调用云端 /api/lessons/translate（携带 JWT token）
     - 无网时：返回 sentences.translation = null，前端显示"翻译待补全"状态
     - 联网后：syncEngine 同步时自动补全翻译字段
  3. 前端 UploadPanel 增加"本地生成"按钮，区分于"云端生成"入口。
result_summary: |
  实现本地课程生成完整流水线：
