schema_version: 1
task_id: TASK-019
title: 新增后端测试扩展
status: in_progress
priority: low
project_root: D:/3.3-19.01
base_ref: main
goal: >
  在 tests/ 下新增三类测试（E2E、契约、API集成），
  均以 TASK-010 建立的 Fixture 系统为基础：
  1. E2E：扩展 tests/e2e/test_e2e_key_flows.py，覆盖注册->登录->上传->课程生成->练习的完整流程（至少 5 个测试用例）
  2. 契约测试：在 tests/contracts/ 下建立 API 契约测试，至少覆盖 lessons 和 auth 两个核心 API，验证后端响应 JSON 符合 Pydantic Schema
  3. API 集成测试：在 tests/integration/api/ 下建立集成测试，覆盖 lessons、practice、wordbook 三个模块，每个模块至少 3 个测试用例
scope:
  - E2E 测试
  - 契约测试
  - API 集成测试
  - 前后端类型对齐
allowed_paths:
  - tests/e2e/
  - tests/contracts/
  - tests/integration/api/
  - frontend/src/shared/api/
acceptance:
  - tests/e2e/test_e2e_key_flows.py 包含至少 5 个 E2E 测试用例，覆盖完整用户流程
  - tests/contracts/ 下有至少 2 个契约测试文件（覆盖 lessons 和 auth API）
  - tests/integration/api/ 下有至少 9 个集成测试用例（每个模块 ≥ 3 个）
  - pytest --collect-only 对 tests/e2e/、tests/contracts/、tests/integration/api/ 均无报错
  - 契约测试不依赖前端构建工具，在后端 tests/ 目录下运行
  - E2E 测试使用 httpx 客户端，不测试 UI 渲染
check_commands:
  - pytest tests/e2e/ --collect-only 2>&1 | Select-Object -First 10
  - pytest tests/contracts/ --collect-only 2>&1 | Select-Object -First 10
  - pytest tests/integration/api/ --collect-only 2>&1 | Select-Object -First 10
depends_on:
  - TASK-010
dependency_reason: Fixture 系统化（TASK-010）完成后，E2E、契约测试、集成测试才有可复用的测试数据基础
blocked_by: []
conflicts_with: []
notes_for_after: |
  本任务由 TASK-019（E2E测试）、TASK-020（契约测试）、TASK-021（API集成测试）三个任务合并而来。
  三类测试的文件边界完全不同，互相不冲突，可以独立实现。
  E2E 测试：使用 httpx 客户端，测试 API 端点正确性，不依赖 Playwright 或 Selenium。
  契约测试：使用 httpx 客户端调用实际 API，验证响应 JSON 符合后端 Schema（不依赖前端构建工具）。
  API 集成测试：使用 httpx + fixtures 中的测试数据，使用 mock 或 fake，不依赖真实 DashScope/Qwen API。
  注意：TASK-017（前端共享类型）完成后，契约测试应更新前端类型对齐路径；若 TASK-017 尚未完成，先用当前 Schema 运行测试。
