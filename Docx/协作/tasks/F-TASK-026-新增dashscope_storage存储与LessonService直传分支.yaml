schema_version: 1
task_id: TASK-026
title: 新增dashscope_storage存储与LessonService直传分支
status: done
priority: high
project_root: D:/3.3-19.01
base_ref: main
goal: >
  新增 app/infra/dashscope_storage.py（DashScope storage URL 管理），
  并在 app/services/lesson_service.py 中新增 generate_from_dashscope_file_id() 方法分支。
  核心：当课程生成任务携带 dashscope_file_id 时，跳过文件存储步骤，
  直接用 file_id 向 DashScope 查询 signed URL 并传给 QwenTranscription 推理。
scope:
  - DashScope storage URL 管理
  - 课程生成直传分支
  - ASR 推理入口改造
allowed_paths:
  - app/infra/dashscope_storage.py
  - app/infra/asr_dashscope.py
  - app/services/lesson_service.py
  - app/services/transcription_service.py
acceptance:
  - "dashscope_storage.py 提供 request_upload_url() 和 get_file_url() 函数"
  - "LessonService.generate_from_dashscope_file_id() 可正确使用 dashscope_file_id 完成 ASR 推理"
  - "generate_from_dashscope_file_id() 跳过 convert_audio 阶段（视频已在 DashScope）"
  - "现有 generate_from_saved_file() 路径不受影响"
  - "python -c 'from app.services.lesson_service import LessonService; print(\"LessonService imports OK\")'"
check_commands:
  - python -c "from app.services.lesson_service import LessonService; print('LessonService imports OK')"
  - python -c "from app.infra.dashscope_storage import get_file_signed_url; print('dashscope_storage OK')"
depends_on:
  - TASK-025
dependency_reason: TASK-025 提供 pre-signed URL 接口，TASK-026 使用该接口的 file_id 进行推理，两者顺序执行
blocked_by: []
conflicts_with: []
notes_for_after: |
  dashscope_storage.py 需要实现：
  1. request_upload_url(filename, content_type) -> {upload_url, file_id, expires_at}
     - 当前 app/infra/asr_dashscope.py 中 Files.upload() 模式可参考
     - 如果 DashScope Files API 支持 build_upload_url（pre-signed PUT URL）则使用
     - 否则使用底层 requests 调用 DashScope Files API 的认证 URL 申请接口
  2. get_file_url(file_id) -> signed_url
     - 调用 Files.get(file_id) 获取 signed URL（已在当前代码中验证）
  lesson_service.py 需要新增：
  3. generate_from_dashscope_file_id(dashscope_file_id, ...) 方法
     - 与 generate_from_saved_file() 并行的新分支
     - 调用 dashscope_storage.get_file_url(file_id) 获取 signed_url
     - 调用 transcribe_audio_file_with_qwen(signed_url) 而非读本地文件
     - 跳过 convert_audio 阶段，直接进入 build_lesson 阶段
  4. transcription_service.py 可能需要新增 transcribe_url() 函数接受 signed_url
result_summary: |
  三个文件变更：
  1. 新建 app/infra/dashscope_storage.py：get_file_signed_url()（调用 Files.get 获取 signed URL）和 verify_file_exists()
  2. 追加 app/infra/asr_dashscope.py：新增 transcribe_signed_url() 函数，跳过 Files.upload 直接创建 ASR 任务并轮询结果
  3. 追加 app/services/lesson_service.py：新增 generate_from_dashscope_file_id()，跳过 convert_audio 阶段，调用 transcribe_signed_url() 推理
changed_files:
  - app/infra/dashscope_storage.py
  - app/infra/asr_dashscope.py
  - app/services/lesson_service.py
tests_run:
