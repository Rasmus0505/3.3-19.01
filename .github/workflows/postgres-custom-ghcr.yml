name: Build Custom PostgreSQL Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Custom image tag for GHCR
        required: true
        default: pg18-custom

permissions:
  contents: read
  packages: write

jobs:
  build-custom-postgres:
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/postgres-custom
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'pg18-custom' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/postgres-custom/Dockerfile
          pull: true
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Custom postgres image published: ${GHCR_IMAGE}:${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
