name: Mirror PostgreSQL to GHCR (Fallback)

on:
  workflow_dispatch:
    inputs:
      postgres_tag:
        description: PostgreSQL tag from Docker Hub (for example 18 or 18.1)
        required: true
        default: "18"
      also_push_dockerhub:
        description: Push the same mirror to Docker Hub as backup
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: postgres-mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      POSTGRES_TAG: ${{ github.event.inputs.postgres_tag || '18' }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/postgres-mirror
    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror postgres image to GHCR
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_IMAGE="docker.io/library/postgres:${POSTGRES_TAG}"
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}:${POSTGRES_TAG}" \
            --tag "${GHCR_IMAGE}:latest" \
            "${SOURCE_IMAGE}"

      - name: Login Docker Hub (optional backup)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.also_push_dockerhub == 'true' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Mirror to Docker Hub (optional backup)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.also_push_dockerhub == 'true' && secrets.DOCKERHUB_IMAGE != '' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        shell: bash
        env:
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail
          SOURCE_IMAGE="docker.io/library/postgres:${POSTGRES_TAG}"
          docker buildx imagetools create \
            --tag "docker.io/${DOCKERHUB_IMAGE}:${POSTGRES_TAG}" \
            --tag "docker.io/${DOCKERHUB_IMAGE}:latest" \
            "${SOURCE_IMAGE}"

      - name: Publish summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Fallback only: preferred production path is Zeabur managed PostgreSQL." >> "$GITHUB_STEP_SUMMARY"
          echo "Mirrored docker.io/library/postgres:${POSTGRES_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Primary image: ${GHCR_IMAGE}:${POSTGRES_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Fallback image: docker.io/\${DOCKERHUB_IMAGE}:${POSTGRES_TAG} (if enabled)" >> "$GITHUB_STEP_SUMMARY"
