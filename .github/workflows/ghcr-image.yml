name: Build App Image to GHCR (Fallback)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-app-fallback
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        shell: bash
        run: |
          set -euo pipefail
          echo "This GHCR workflow is now fallback-only." >> "$GITHUB_STEP_SUMMARY"
          echo "Preferred deploy path: Zeabur -> GitHub repository -> Dockerfile build." >> "$GITHUB_STEP_SUMMARY"
